<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060d1a;font-family:system-ui,sans-serif;color:#dde4f0;font-size:14px}
input,button,select,textarea{font-family:inherit;font-size:13px}
button{cursor:pointer}
.card{background:#0b1525;border:1px solid #172340;border-radius:11px;padding:16px;margin-bottom:12px}
.inp{background:#050c18;border:1px solid #172340;border-radius:7px;padding:8px 10px;color:#dde4f0;width:100%;outline:none;box-sizing:border-box}
.btn-p{background:linear-gradient(135deg,#00C896,#0088cc);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-weight:600;cursor:pointer}
.btn-s{background:linear-gradient(135deg,#f04060,#aa1133);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-weight:600;cursor:pointer}
.btn-g{background:#172340;color:#fff;border:none;border-radius:7px;padding:9px 16px;font-weight:600;cursor:pointer}
.btn-p:disabled,.btn-s:disabled{opacity:0.5;cursor:not-allowed}
.hdr{background:#0b1525;border-bottom:1px solid #172340;padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.nav{display:flex;gap:2px;overflow-x:auto}
.nav button{background:transparent;color:#3a5a8a;border:none;border-radius:6px;padding:5px 9px;font-size:11px;white-space:nowrap}
.nav button.active{background:#00C89615;color:#00C896;font-weight:600}
.main{max-width:860px;margin:0 auto;padding:16px 9px}
.row{display:flex;gap:9px;flex-wrap:wrap}
.stat{flex:1;min-width:100px;background:#080f1c;border:1px solid #172340;border-radius:9px;padding:11px}
.logo-ico{width:28px;height:28px;background:linear-gradient(135deg,#00C896,#0066cc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:600;color:#3a5a8a;padding:4px 6px;border-bottom:1px solid #172340}
td{padding:7px 6px;border-bottom:1px solid #0b1525;font-size:12px}
select{background:#050c18;border:1px solid #172340;border-radius:7px;padding:8px 10px;color:#dde4f0;width:100%;outline:none}
.msg-ok{color:#00C896;font-size:12px;margin-top:7px}
.msg-er{color:#f04060;font-size:12px;margin-top:7px}
.spin{text-align:center;padding:40px 0;color:#3a5a8a;font-size:12px}
</style>

// ========================================
// API HELPER - all real data comes from the backend.
// Only the auth token itself lives in localStorage (needed as a fallback
// since cross-site cookies are blocked by default in modern browsers).
// User data, passwords, and balances are never cached client-side.
// ========================================
function api(path, method, body) {
  var m = (method || "GET").toUpperCase();
  var opts = {
    method: m,
    credentials: "include",
    headers: { "Content-Type": "application/json" }
  };
  // Primary auth path: Authorization header with a Bearer token. Many
  // browsers now block cross-site cookies by default (frontend on
  // github.io, backend on railway.app are different sites), so the
  // httpOnly cookie the server also sets can silently fail to be stored/
  // sent. The token is kept in localStorage and attached here instead -
  // this works regardless of third-party cookie settings.
  if (state.token) {
    opts.headers["Authorization"] = "Bearer " + state.token;
  }
  // CSRF defense-in-depth: the token is only ever handed to us inside a JSON
  // response body (never as a readable cookie), so a malicious third-party
  // site cannot obtain it and cannot forge this header - even though the
  // browser would still attach our auth cookie to a cross-site request.
  if (m !== "GET" && state.csrfToken) {
    opts.headers["X-CSRF-Token"] = state.csrfToken;
  }
  if (body !== undefined) opts.body = JSON.stringify(body);
  return fetch(API_URL + path, opts).then(function(res) {
    return res.text().then(function(text) {
      var data;
      try { data = text ? JSON.parse(text) : {}; } catch (e) { data = {}; }
      if (!res.ok) {
        var err = new Error(data.error || "Istek basarisiz (" + res.status + ")");
        throw err;
      }
      return data;
    });
  });
}

function h(str) {
  return String(str == null ? "" : str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ========================================
// STATE - only holds data fetched from backend for the current session.
// ========================================
var state = {
  booting: true,       // true while checking session on first load
  cur: null,            // current user, from /api/auth/me
  csrfToken: null,       // in-memory only, never persisted
  lang: localStorage.getItem("opay_lang") || "en",
  langMenuOpen: false,
  // Bearer token, kept in localStorage so it survives page refresh. This is
  // a deliberate trade-off: it's JS-readable (unlike an httpOnly cookie),
  // but it's the only reliable option now that cross-site cookies are
  // blocked by default in modern browsers for a frontend/backend split
  // across two different domains. Mitigated by the fact this codebase has
  // no known XSS vector (all output is escaped via h()).
  token: localStorage.getItem("opay_token") || null,
  page: "dashboard",
  authMode: "login",
  adminTab: "price",
  wTab: "deposit",
  exMode: "buy",

  priceInfo: null,       // {buyPrice, sellPrice, spread}
  priceHistory: [],      // [{buy, date}]
  cards: [],
  txs: [],
  wtxs: [],

  adminUsers: [],
  adminPrices: [],       // with ids
  adminWtxs: [],

  busy: false,           // generic "request in flight" flag for buttons
  errAuth: ""
};

// ========================================
// BOOTSTRAP
// ========================================
function boot() {
  if (!state.token) {
    state.booting = false;
    render();
    return;
  }
  api("/api/auth/me").then(function(u) {
    state.cur = u;
    state.csrfToken = u.csrfToken;
    state.booting = false;
    render();
    loadDashboardData();
  }).catch(function() {
    state.cur = null;
    state.csrfToken = null;
    state.token = null;
    localStorage.removeItem("opay_token");
    state.booting = false;
    render();
  });
}

function loadDashboardData() {
  api("/api/price").then(function(p) { state.priceInfo = p; render(); }).catch(function(){});
  api("/api/prices").then(function(p) { state.priceHistory = p; render(); }).catch(function(){});
  api("/api/cards").then(function(c) { state.cards = c; render(); }).catch(function(){});
}

function refreshMe() {
  return api("/api/auth/me").then(function(u) { state.cur = u; state.csrfToken = u.csrfToken; });
}

// ========================================
// CHART
// ========================================
function makeChart() {
  var history = state.priceHistory;
  if (!history || history.length < 2) return '<div style="text-align:center;color:#3a5a8a;font-size:12px;padding:20px 0">'+t("notEnoughData")+'</div>';
  var W=520, H=150, PL=42, PT=8, PR=8, PB=24;
  var pw = W-PL-PR, ph = H-PT-PB;
  var ps = history.map(function(p) { return parseFloat(p.buy); });
  var mn = Math.min.apply(null,ps)*0.97;
  var mx = Math.max.apply(null,ps)*1.02;
  var xi = function(i) { return PL + i*(pw/(history.length-1)); };
  var yi = function(v) { return PT + ph - ((v-mn)/(mx-mn))*ph; };
  var pts = history.map(function(_,i) { return [xi(i), yi(ps[i])]; });
  var line = pts.map(function(p,i) { return (i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" ");
  var area = line + " L"+pts[pts.length-1][0]+","+(PT+ph)+" L"+pts[0][0]+","+(PT+ph)+" Z";
  var ticks = [mn, (mn+mx)/2, mx];
  var ticksSvg = ticks.map(function(t) {
    return '<line x1="'+PL+'" y1="'+yi(t).toFixed(1)+'" x2="'+(PL+pw)+'" y2="'+yi(t).toFixed(1)+'" stroke="#ffffff08" stroke-width="1"/>'+
           '<text x="'+(PL-3)+'" y="'+(yi(t)+4).toFixed(1)+'" text-anchor="end" fill="#445" font-size="10">$'+t.toFixed(2)+'</text>';
  }).join("");
  var labCount = Math.min(5, history.length);
  var labIdx = [];
  for (var li = 0; li < labCount; li++) {
    labIdx.push(Math.round(li * (history.length - 1) / (labCount - 1)));
  }
  labIdx = labIdx.filter(function(v, idx, arr) { return arr.indexOf(v) === idx; });
  var labsSvg = labIdx.map(function(i) {
    return '<text x="'+xi(i).toFixed(1)+'" y="'+(H-2)+'" text-anchor="middle" fill="#445" font-size="9">'+h(history[i].date.slice(0,7))+'</text>';
  }).join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'+
    '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#00C896" stop-opacity="0.3"/>'+
    '<stop offset="100%" stop-color="#00C896" stop-opacity="0.02"/></linearGradient></defs>'+
    ticksSvg + labsSvg +
    '<path d="'+area+'" fill="url(#g)"/>'+
    '<path d="'+line+'" fill="none" stroke="#00C896" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+
    '<circle cx="'+pts[pts.length-1][0].toFixed(1)+'" cy="'+pts[pts.length-1][1].toFixed(1)+'" r="4" fill="#00C896" stroke="#0a1628" stroke-width="2"/>'+
    '</svg>';
}

function render() {
  var app = document.getElementById("app");
  if (!app) return;

  if (state.booting) {
    app.innerHTML = '<div class="spin">'+t("loading")+'</div>';
    return;
  }

  if (!state.cur) {
    renderAuth(app);
    return;
  }

  var buyP = state.priceInfo ? state.priceInfo.buyPrice : 0;
  var sellP = state.priceInfo ? state.priceInfo.sellPrice : 0;
  var spread = state.priceInfo ? state.priceInfo.spread : 0;
  var cur = state.cur;
  var isAdmin = cur.isAdmin;

  var navItems = [
    {id:"dashboard",label:t("navDashboard")},
    {id:"exchange",label:t("navExchange")},
    {id:"history",label:t("navHistory")},
    {id:"wallet",label:t("navWallet")}
  ];
  if (isAdmin) navItems.push({id:"admin",label:t("navAdmin")});

  var navHtml = navItems.map(function(n) {
    return '<button class="'+(state.page===n.id?"active":"")+'" onclick="setPage(\''+n.id+'\')">'+h(n.label)+'</button>';
  }).join("");

  var pageHtml = "";
  if (state.page === "dashboard") pageHtml = renderDashboard(buyP, sellP, spread, cur);
  else if (state.page === "exchange") pageHtml = renderExchange(buyP, sellP, cur);
  else if (state.page === "history") pageHtml = renderHistory();
  else if (state.page === "wallet") pageHtml = renderWallet(cur);
  else if (state.page === "admin" && isAdmin) pageHtml = renderAdmin(buyP, spread);

  app.innerHTML =
    '<div class="hdr" style="flex-direction:column;height:auto;padding:8px 14px;gap:6px;align-items:stretch">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">'+
    '<div style="display:flex;align-items:center;gap:7px;flex-shrink:0"><img src="'+LOGO_DATA_URI+'" class="logo-ico" style="object-fit:cover"/><span style="font-weight:700;font-size:14px;color:#fff">OPAY TOKEN</span></div>'+
    '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'+
    renderLangPicker(true)+
    '<span style="font-size:11px;color:#3a5a8a;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+h(cur.fullName || cur.username)+'</span>'+
    '<button class="btn-g" style="padding:4px 9px;font-size:11px" onclick="doLogout()">'+t("logout")+'</button>'+
    '</div></div>'+
    '<div class="nav" style="justify-content:flex-start">'+navHtml+'</div>'+
    '</div>'+
    '<div class="main">'+pageHtml+'</div>';
}

// ========================================
// ACTIONS
// ========================================
function setPage(p) {
  state.page = p;
  render();
  if (p === "history" && !state.txsLoaded) {
    api("/api/transactions").then(function(t) { state.txs = t; state.txsLoaded = true; render(); }).catch(function(){});
  }
  if (p === "wallet" && state.wTab === "history" && !state.wtxsLoaded) {
    loadWtxs();
  }
  if (p === "admin") {
    if (state.adminTab === "users" && !state.adminUsersLoaded) loadAdminUsers();
    if (state.adminTab === "price" && !state.adminPricesLoaded) loadAdminPrices();
    if (state.adminTab === "wallets" && !state.adminWtxsLoaded) loadAdminWtxs();
  }
}

function toggleAuth() { state.authMode = state.authMode==="login"?"register":"login"; state.errAuth=""; render(); }
function setExMode(m) { state.exMode = m; render(); }
function setWTab(t) {
  state.wTab = t;
  render();
  if (t === "history" && !state.wtxsLoaded) loadWtxs();
}
function setAdminTab(t) {
  state.adminTab = t;
  render();
  if (t === "users" && !state.adminUsersLoaded) loadAdminUsers();
  if (t === "price" && !state.adminPricesLoaded) loadAdminPrices();
  if (t === "wallets" && !state.adminWtxsLoaded) loadAdminWtxs();
}

function showMsg(id, msg, ok) {
  var el = document.getElementById(id);
  if (el) el.innerHTML = '<div class="'+(ok?"msg-ok":"msg-er")+'">'+h(msg)+'</div>';
}

function loadWtxs() {
  api("/api/wallet/history").then(function(w) { state.wtxs = w; state.wtxsLoaded = true; render(); }).catch(function(){});
}
function loadAdminUsers() {
  api("/api/admin/users").then(function(u) { state.adminUsers = u; state.adminUsersLoaded = true; render(); }).catch(function(){});
}
function loadAdminPrices() {
  api("/api/admin/prices").then(function(p) { state.adminPrices = p; state.adminPricesLoaded = true; render(); }).catch(function(){});
}
function loadAdminWtxs() {
  api("/api/admin/wallet-requests").then(function(w) { state.adminWtxs = w; state.adminWtxsLoaded = true; render(); }).catch(function(){});
}

// -- AUTH --
function doAuth() {
  state.errAuth = "";
  var email = (document.getElementById("aEmail")||{}).value || "";
  var pw = (document.getElementById("aPw")||{}).value || "";
  email = email.trim();

  if (state.authMode === "login") {
    if (!email || !pw) { showMsg("authMsg",t("fillAllFields"),false); return; }
    state.busy = true; render();
    api("/api/auth/login", "POST", { login: email, password: pw }).then(function(r) {
      state.token = r.token;
      localStorage.setItem("opay_token", r.token);
      return refreshMe();
    }).then(function() {
      state.busy = false;
      state.page = "dashboard";
      render();
      loadDashboardData();
    }).catch(function(e) {
      state.busy = false;
      render();
      showMsg("authMsg", e.message, false);
    });
  } else {
    var name = (document.getElementById("aName")||{}).value.trim() || "";
    var user = (document.getElementById("aUser")||{}).value.trim() || "";
    var cpw = (document.getElementById("aCPw")||{}).value || "";
    if (!name||!user||!email||!pw||!cpw) { showMsg("authMsg",t("fillAllFields"),false); return; }
    if (pw !== cpw) { showMsg("authMsg",t("passwordsNoMatch"),false); return; }
    state.busy = true; render();
    api("/api/auth/register", "POST", { username: user, email: email, password: pw, fullName: name }).then(function() {
      state.busy = false;
      state.authMode = "login";
      render();
      showMsg("authMsg",t("accountCreated"),true);
    }).catch(function(e) {
      state.busy = false;
      render();
      showMsg("authMsg", e.message, false);
    });
  }
}

function doLogout() {
  api("/api/auth/logout", "POST").catch(function(){}).then(function() {
    localStorage.removeItem("opay_token");
    var keepLang = state.lang;
    state = {
      booting:false, cur:null, csrfToken:null, token:null, page:"dashboard", authMode:"login", adminTab:"price",
      wTab:"deposit", exMode:"buy", priceInfo:null, priceHistory:[], cards:[],
      txs:[], wtxs:[], adminUsers:[], adminPrices:[], adminWtxs:[], busy:false, errAuth:"",
      lang: keepLang, langMenuOpen: false
    };
    render();
  });
}

// -- EXCHANGE --
function calcEx() {
  var el = document.getElementById("exAmt");
  var preview = document.getElementById("exPreview");
  if (!el || !preview || !state.priceInfo) return;
  var amt = parseFloat(el.value);
  var buyP = state.priceInfo.buyPrice;
  var sellP = state.priceInfo.sellPrice;
  if (!amt || amt <= 0) { preview.innerHTML = ""; return; }
  if (state.exMode === "buy") {
    preview.innerHTML = '<div style="background:#060d1a;border-radius:8px;padding:10px;margin-bottom:11px;font-size:12px">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="color:#3a5a8a">'+t("youWillReceive")+':</span><span style="color:#00C896;font-weight:700">'+amt.toFixed(2)+' OPAY</span></div>'+
      '<div style="display:flex;justify-content:space-between"><span style="color:#3a5a8a">'+t("youWillPay")+':</span><span style="font-weight:700">'+(amt*buyP).toFixed(4)+' USDT</span></div></div>';
  } else {
    var get = amt * sellP;
    preview.innerHTML = '<div style="background:#060d1a;border-radius:8px;padding:10px;margin-bottom:11px;font-size:12px">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="color:#3a5a8a">'+t("youWillSell")+':</span><span style="color:#ff9f4a;font-weight:700">'+amt.toFixed(2)+' OPAY</span></div>'+
      '<div style="display:flex;justify-content:space-between"><span style="color:#3a5a8a">'+t("youWillReceive")+':</span><span style="font-weight:700">'+get.toFixed(4)+' USDT</span></div>'+
      (get<10?'<div class="msg-er" style="padding:3px 7px;margin-top:2px">'+t("minSellNote")+'</div>':"")+
      '</div>';
  }
}

function doExchange() {
  var el = document.getElementById("exAmt");
  if (!el) return;
  var amt = parseFloat(el.value);
  if (!amt || amt <= 0) { showMsg("exMsg",t("enterValidAmount"),false); return; }
  state.busy = true; render();
  api("/api/exchange", "POST", { type: state.exMode, amount: amt }).then(function(r) {
    return refreshMe().then(function() { return r; });
  }).then(function(r) {
    state.busy = false;
    state.txsLoaded = false;
    render();
    showMsg("exMsg", t("exchangeSuccess")+": "+r.opayAmount.toFixed(2)+" OPAY / "+r.usdtAmount.toFixed(4)+" USDT", true);
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("exMsg", e.message, false);
  });
}

// -- ADMIN: PRICE --
function doUpdatePrice() {
  var el = document.getElementById("newPrice");
  if (!el) return;
  var p = parseFloat(el.value);
  if (!p || p <= 0) { showMsg("prMsg","Gecerli fiyat girin.",false); return; }
  state.busy = true; render();
  api("/api/admin/price", "POST", { price: p }).then(function() {
    state.busy = false;
    state.adminPricesLoaded = false;
    render();
    showMsg("prMsg","OK Fiyat guncellendi",true);
    loadAdminPrices();
    loadDashboardData();
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("prMsg", e.message, false);
  });
}

function delPrice(id) {
  api("/api/admin/price/" + id, "DELETE").then(function() {
    loadAdminPrices();
    loadDashboardData();
  }).catch(function(){});
}

// -- ADMIN: SPREAD --
function doSaveSpread() {
  var el = document.getElementById("newSpread");
  if (!el) return;
  var s = parseFloat(el.value);
  if (isNaN(s) || s < 0 || s > 50) { showMsg("spreadMsg","0-50 arasi girin.",false); return; }
  state.busy = true; render();
  api("/api/admin/spread", "POST", { spread: s }).then(function() {
    state.busy = false;
    render();
    showMsg("spreadMsg","OK Kaydedildi.",true);
    loadDashboardData();
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("spreadMsg", e.message, false);
  });
}

// -- ADMIN: CONTENT --
function updateCard(i, field, val) { state.cards[i][field] = val; }
function saveCards() {
  state.busy = true; render();
  api("/api/admin/cards", "POST", { cards: state.cards }).then(function() {
    state.busy = false;
    render();
    showMsg("cntMsg","OK Kaydedildi.",true);
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("cntMsg", e.message, false);
  });
}

// -- ADMIN: USERS --
function adjBal(userId, type) {
  var amt = parseFloat(prompt("Miktar girin:"));
  if (!amt || amt < 0) return;
  api("/api/admin/users/" + userId + "/balance", "POST", { type: type, amount: amt }).then(function() {
    loadAdminUsers();
  }).catch(function(e) { alert(e.message); });
}

// -- ADMIN: CRYPTOMUS --
function saveCM() {
  var k = (document.getElementById("cmKeyInp")||{}).value || "";
  var s = (document.getElementById("cmSecInp")||{}).value || "";
  if (!k || !s) { showMsg("cmMsg","Her iki alani da doldurun.",false); return; }
  state.busy = true; render();
  api("/api/admin/cryptomus", "POST", { merchant: k, secret: s }).then(function() {
    state.busy = false;
    render();
    showMsg("cmMsg","OK Kaydedildi!",true);
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("cmMsg", e.message, false);
  });
}

// -- WALLET: DEPOSIT / WITHDRAW --
function doDeposit() {
  var amtEl = document.getElementById("depAmt");
  var coinEl = document.getElementById("depCoin");
  var netEl = document.getElementById("depNet");
  if (!amtEl) return;
  var amt = parseFloat(amtEl.value);
  if (!amt || amt <= 0) { showMsg("depMsg",t("enterValidAmount"),false); return; }
  var coin = coinEl ? coinEl.value : "USDT";
  var net = netEl ? netEl.value : "TRON";
  state.busy = true; render();
  api("/api/wallet/deposit", "POST", { amount: amt, coin: coin, network: net }).then(function(r) {
    state.busy = false;
    render();
    if (r.url) {
      showMsg("depMsg",t("paymentOpening"),true);
      window.open(r.url, "_blank");
    } else {
      showMsg("depMsg",t("requestCreated"),true);
    }
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("depMsg", e.message, false);
  });
}

function doWithdraw() {
  var amtEl = document.getElementById("wdAmt");
  var addrEl = document.getElementById("wdAddr");
  var netEl = document.getElementById("wdNet");
  if (!amtEl) return;
  var amt = parseFloat(amtEl.value);
  var addr = addrEl ? addrEl.value.trim() : "";
  var net = netEl ? netEl.value : "TRON";
  if (!amt || amt < 10) { showMsg("wdMsg",t("minWithdrawError"),false); return; }
  if (!addr || addr.length < 10) { showMsg("wdMsg",t("enterValidAddress"),false); return; }
  state.busy = true; render();
  api("/api/wallet/withdraw", "POST", { amount: amt, network: net, address: addr }).then(function() {
    return refreshMe();
  }).then(function() {
    state.busy = false;
    state.wtxsLoaded = false;
    render();
    showMsg("wdMsg",t("withdrawReceived"),true);
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("wdMsg", e.message, false);
  });
}

// -- ADMIN: WALLET REQUESTS --
function approveTx(id) {
  api("/api/admin/wallet-requests/" + id + "/approve", "POST").then(function() {
    loadAdminWtxs();
  }).catch(function(e) { alert(e.message); });
}
function rejectTx(id) {
  api("/api/admin/wallet-requests/" + id + "/reject", "POST").then(function() {
    loadAdminWtxs();
  }).catch(function(e) { alert(e.message); });
}

// ========================================
// START
// ========================================
boot();
</script>
