<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opay</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f3f4f6;">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const LANGS = [
          { code:"en", flag:"🇺🇸", label:"English" },
          { code:"tr", flag:"🇹🇷", label:"Türkçe" },
          { code:"es", flag:"🇪🇸", label:"Español" },
          { code:"pt", flag:"🇧🇷", label:"Português (Brasil)" },
          { code:"fr", flag:"🇫🇷", label:"Français" },
          { code:"de", flag:"🇩🇪", label:"Deutsch" },
          { code:"ru", flag:"🇷🇺", label:"Русский" },
          { code:"ja", flag:"🇯🇵", label:"日本語" },
          { code:"ko", flag:"🇰🇷", label:"한국어" },
          { code:"zh", flag:"🇨🇳", label:"简体中文" },
          { code:"it", flag:"🇮🇹", label:"Italiano" },
          { code:"id", flag:"🇮🇩", label:"Bahasa Indonesia" },
          { code:"vi", flag:"🇻🇳", label:"Tiếng Việt" },
          { code:"th", flag:"🇹🇭", label:"ไทย" },
          { code:"hi", flag:"🇮🇳", label:"हिन्दी" },
          { code:"ar", flag:"🇸🇦", label:"العربية" },
          { code:"pl", flag:"🇵🇱", label:"Polski" }
        ];

        const D = {
          en: { login: "Login", register: "Register", username: "Username", email: "Email", password: "Password", confirmPw: "Confirm Password", adminTitle: "Admin Dashboard" },
          tr: { login: "Giriş Yap", register: "Kayıt Ol", username: "Kullanıcı Adı", email: "E-posta", password: "Şifre", confirmPw: "Şifreyi Onayla", adminTitle: "Yönetici Paneli" }
        };

        const s = {
          card: { background: "#ffffff", padding: "24px", borderRadius: "12px", boxShadow: "0 4px 12px rgba(0,0,0,0.08)", boxSizing: "border-box" },
          inp: { width: "100%", padding: "12px", marginBottom: "12px", borderRadius: "6px", border: "1px solid #d1d5db", boxSizing: "border-box" },
          btn: (type) => ({ padding: "12px 20px", background: type === "primary" ? "#2563eb" : "#4b5563", color: "#fff", border: "none", borderRadius: "6px", cursor: "pointer", width: "100%" })
        };

        function App() {
          const [lang, setLang] = useState("tr");
          const [mode, setMode] = useState("login");
          const [user, setUser] = useState("");
          const [email, setEmail] = useState("");
          const [pw, setPw] = useState("");
          const [cpw, setCpw] = useState("");
          const [isAuthed, setIsAuthed] = useState(false);

          const T = (key) => D[lang]?.[key] || D["en"][key] || key;

          return (
            <div style={{ padding: "20px", maxWidth: "400px", margin: "40px auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "20px" }}>
                <h2>OPAY</h2>
                <select value={lang} onChange={e => setLang(e.target.value)}>
                  {LANGS.map(l => <option key={l.code} value={l.code}>{l.flag} {l.label}</option>)}
                </select>
              </div>

              {!isAuthed ? (
                <div style={s.card}>
                  <h3>{mode === "login" ? T("login") : T("register")}</h3>
                  <input style={s.inp} placeholder={T("username")} value={user} onChange={e=>setUser(e.target.value)}/>
                  {mode === "register" && <input style={s.inp} type="email" placeholder={T("email")} value={email} onChange={e=>setEmail(e.target.value)}/>}
                  <input style={s.inp} type="password" placeholder={T("password")} value={pw} onChange={e=>setPw(e.target.value)}/>
                  {mode === "register" && <input style={s.inp} type="password" placeholder={T("confirmPw")} value={cpw} onChange={e=>setCpw(e.target.value)}/>}
                  <button style={s.btn("primary")} onClick={() => setIsAuthed(true)}>{mode === "login" ? T("login") : T("register")}</button>
                  <p onClick={() => setMode(mode === "login" ? "register" : "login")} style={{color: "#2563eb", cursor: "pointer", marginTop: "15px", textAlign: "center"}}>
                    {mode === "login" ? "Hesap Oluştur" : "Giriş Yap"}
                  </p>
                </div>
              ) : (
                <div style={s.card}>
                  <h3>{T("adminTitle")}</h3>
                  <p>Hoş geldiniz, @{user}!</p>
                  <button style={s.btn("secondary")} onClick={() => setIsAuthed(false)}>Çıkış Yap</button>
                </div>
              )}
            </div>
          );
        }

        // Hatalardan arındırılmış başlatma kodu
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
