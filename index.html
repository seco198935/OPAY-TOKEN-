let _app=null, _db=null, _auth=null;

async function initFirebase(){
  if(_app) return {db:_db,auth:_auth};
  try{
    const [appMod,authMod,dbMod]=await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"),
      import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"),
    ]);
    _app=appMod.initializeApp(FB_CFG);
    _auth=authMod.getAuth(_app);
    _db=dbMod.getDatabase(_app);
    window._fbAuth=_auth;
    window._fbDb=_db;
    window._fbMods={...authMod,...dbMod};
    return {db:_db,auth:_auth,mods:{...authMod,...dbMod}};
  }catch(e){
    console.error("Firebase load failed:",e);
    return null;
  }
}

// PRICE CHART
// ═══════════════════════════════════════
function Chart({history}){
  if(!history||history.length<2) return null;
  const W=560,H=170,PL=46,PT=8,PR=8,PB=28;
  const pw=W-PL-PR,ph=H-PT-PB;
  const ps=history.map(h=>parseFloat(h.buy));
  const mn=Math.min(...ps)*0.97,mx=Math.max(...ps)*1.02;
  const xi=i=>PL+i*(pw/(history.length-1));
  const yi=v=>PT+ph-((v-mn)/(mx-mn))*ph;
  const pts=history.map((_,i)=>[xi(i),yi(parseFloat(history[i].buy))]);
  const line=pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const area=line+" L"+pts[pts.length-1][0]+","+(PT+ph)+" L"+pts[0][0]+","+(PT+ph)+" Z";
  return(
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#00C896" stopOpacity="0.3"/><stop offset="100%" stopColor="#00C896" stopOpacity="0.02"/></linearGradient></defs>
      {[mn,(mn+mx)/2,mx].map((t,i)=><g key={i}><line x1={PL} y1={yi(t)} x2={PL+pw} y2={yi(t)} stroke="#ffffff08" strokeWidth="1"/><text x={PL-3} y={yi(t)+4} textAnchor="end" fill="#445" fontSize="10">${t.toFixed(2)}</text></g>)}
      {[0,Math.floor(history.length/2),history.length-1].map(i=><text key={i} x={xi(i)} y={H-3} textAnchor="middle" fill="#445" fontSize="9">{history[i].date.slice(0,7)}</text>)}
      <path d={area} fill="url(#g)"/>
      <path d={line} fill="none" stroke="#00C896" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="4" fill="#00C896" stroke="#0a1628" strokeWidth="2"/>
    </svg>
  );
}

  // WALLET
  async function doDeposit(){
    setDepMsg("");
    const amt=parseFloat(depAmt);
    if(!amt||amt<=0){setDepMsg(t("errAmt2"));return;}
    if(!cmKey||!cmSec){setDepMsg("⚠️ Cryptomus ayarlı değil.");return;}
    const oid="DEP-"+Date.now()+"-"+user.uid;
    const body={amount:String(amt),currency:"USD",order_id:oid,url_return:window.location.href,network:depNet,to_currency:depCoin,lifetime:3600};
    try{
      const enc=new TextEncoder();
      const str=btoa(JSON.stringify(body));
      const key=await crypto.subtle.importKey("raw",enc.encode(cmSec),{name:"HMAC",hash:"MD5"},false,["sign"]);
      const sig=await crypto.subtle.sign("HMAC",key,enc.encode(str));
      const sign=Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,"0")).join("");
      const res=await fetch("https://api.cryptomus.com/v1/payment",{method:"POST",headers:{"merchant":cmKey,"sign":sign,"Content-Type":"application/json"},body:JSON.stringify(body)});
      const data=await res.json();
      if(data?.result?.url){
        const ts=Date.now();
        await dbSet("walletTxs/"+user.uid+"/"+ts,{id:oid,type:"deposit",amt,coin:depCoin,net:depNet,status:"pending",date:new Date().toISOString().slice(0,16).replace("T"," "),ts,uid:user.uid});
        setDepMsg(t("depPending"));setTimeout(()=>window.open(data.result.url,"_blank"),800);
      }else{setDepMsg("⚠️ "+(data?.errors?.join(", ")||data?.message||"Hata"));}
    }catch(e){setDepMsg("⚠️ "+e.message);}
  }

  }

        {page==="wallet"&&(<div style={{maxWidth:480,margin:"0 auto"}}>
          <div style={{display:"flex",gap:3,marginBottom:12,background:C.bg2,borderRadius:9,padding:3}}>
            {["deposit","withdraw","history"].map(tp=>(<button key={tp} style={{flex:1,padding:"6px 0",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,fontSize:11,background:wTab===tp?"linear-gradient(135deg,#00C896,#0088cc)":"transparent",color:wTab===tp?"#fff":C.mu}} onClick={()=>{setWTab(tp);setDepMsg("");setWdMsg("");}}>
              {tp==="deposit"?"⬇️ "+t("deposit"):tp==="withdraw"?"⬆️ "+t("withdraw"):"📋"}
            </button>))}
          </div>
          {wTab==="deposit"&&(<div style={S.card}>
            <div style={S.ct}>{t("depTitle")}</div>
            {!cmKey&&<div style={{background:"#ff9f4a10",border:"1px solid #ff9f4a30",borderRadius:7,padding:9,fontSize:11,color:C.O,marginBottom:10}}>⚠️ Cryptomus ayarlı değil.</div>}
            <div style={{marginBottom:8}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>{t("depAmt")}</div><input style={S.inp} type="number" min="1" placeholder="10.00" value={depAmt} onChange={e=>{setDepAmt(e.target.value);setDepMsg("");}}/></div>
            <div style={{...S.row,gap:8,marginBottom:8}}>
              <div style={{flex:1}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>{t("depCoin")}</div><select style={{...S.inp,cursor:"pointer"}} value={depCoin} onChange={e=>setDepCoin(e.target.value)}>{["USDT","USDC","BTC","ETH","BNB","TRX","LTC","DOGE","XRP","SOL"].map(c=><option key={c}>{c}</option>)}</select></div>
              <div style={{flex:1}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>{t("depNetwork")}</div><select style={{...S.inp,cursor:"pointer"}} value={depNet} onChange={e=>setDepNet(e.target.value)}>{["TRON","ETH","BSC","POLYGON","SOL","BTC","LTC","XRP","DOGE"].map(n=><option key={n}>{n}</option>)}</select></div>
            </div>
            <div style={{...S.note,fontSize:11,marginBottom:10}}>⚠️ {t("networkNote")}</div>
            <button style={{...S.btn("p"),width:"100%"}} onClick={doDeposit}>{t("depBtn")}</button>
            {depMsg&&<div style={S.msg(depMsg.startsWith("✅"))}>{depMsg}</div>}
          </div>)}
          {wTab==="withdraw"&&(<div style={S.card}>
            <div style={S.ct}>{t("wdTitle")}</div>
            <div style={{background:C.bg,borderRadius:7,padding:10,marginBottom:10,fontSize:12}}><span style={{color:C.mu}}>USDT: </span><span style={{color:C.G,fontWeight:700}}>{(profile.usdt||0).toFixed(2)}</span></div>
            <div style={{marginBottom:8}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>{t("wdAmt")}</div><input style={S.inp} type="number" min="10" placeholder="10.00" value={wdAmt} onChange={e=>{setWdAmt(e.target.value);setWdMsg("");}}/></div>
            <div style={{marginBottom:8}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>{t("wdNet")}</div><select style={{...S.inp,cursor:"pointer"}} value={wdNet} onChange={e=>setWdNet(e.target.value)}>{["TRON","ETH","BSC","POLYGON","SOL","BTC","LTC","XRP","DOGE"].map(n=><option key={n}>{n}</option>)}</select></div>
            <div style={{marginBottom:10}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>{t("wdAddr")}</div><input style={S.inp} placeholder="T... / 0x..." value={wdAddr} onChange={e=>{setWdAddr(e.target.value);setWdMsg("");}}/></div>
            <button style={{...S.btn("s"),width:"100%"}} onClick={doWithdraw}>{t("wdBtn")}</button>
            {wdMsg&&<div style={S.msg(wdMsg.startsWith("✅")||wdMsg.startsWith("⏳"))}>{wdMsg}</div>}
          </div>)}
          {wTab==="history"&&(<div style={S.card}>
            <div style={S.ct}>{t("depHistory")}</div>
            {myWTxs.length===0?<div style={{textAlign:"center",color:C.mu,padding:"24px 0"}}>{t("noWalletTx")}</div>:(<div style={{overflowX:"auto"}}><table style={S.tbl}><thead><tr>{["Type","Date","USDT","Net","Status"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>{myWTxs.map((tx,i)=>(<tr key={i}><td style={S.td}><span style={{...S.tag(tx.type==="deposit"?"buy":"sell"),fontSize:10}}>{tx.type==="deposit"?"⬇️":"⬆️"}</span></td><td style={{...S.td,color:C.mu,fontSize:10}}>{tx.date}</td><td style={{...S.td,color:C.G,fontWeight:600}}>{tx.amt?.toFixed(2)}</td><td style={{...S.td,fontSize:10}}>{tx.net}</td><td style={S.td}><span style={{fontSize:10,fontWeight:600,color:tx.status==="done"?C.G:tx.status==="failed"?C.R:C.O}}>{tx.status==="done"?t("statusDone"):tx.status==="failed"?t("statusFailed"):t("statusPending")}</span></td></tr>))}</tbody></table></div>)}
          </div>)}
        </div>)}

        {/* ADMIN */}
        {page==="admin"&&isAdmin&&(<>
          <div style={{display:"flex",gap:3,marginBottom:12,flexWrap:"wrap"}}>
            {["price","spread","content","users","cryptomus","wallets"].map(tp=>(<button key={tp} style={S.at(adminTab===tp)} onClick={()=>setAdminTab(tp)}>{tp==="price"?"📈":tp==="spread"?"💱":tp==="content"?"✏️":tp==="users"?"👥":tp==="cryptomus"?"🔑":"💳"} {tp}</button>))}
          </div>

          {adminTab==="price"&&(<>
            <div style={S.card}>
              <div style={S.ct}>{t("adminPrice")}</div>
              <div style={S.row}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,marginBottom:6,color:C.mu}}>{t("curBuy")} <span style={{color:C.G,fontWeight:700}}>${buyP.toFixed(4)}</span></div>
                  <div style={{fontSize:11,color:C.mu,marginBottom:4}}>{t("newBuyLbl")}</div>
                  <input style={{...S.inp,marginBottom:8}} type="number" step="0.0001" placeholder={(buyP*1.005).toFixed(4)} value={newP} onChange={e=>setNewP(e.target.value)}/>
                  {newP&&parseFloat(newP)>0&&(<div style={{background:C.bg,borderRadius:7,padding:9,fontSize:12,marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:C.mu}}>Buy:</span><span style={{color:C.G,fontWeight:700}}>${parseFloat(newP).toFixed(4)}</span></div><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.mu}}>Sell:</span><span style={{color:C.O,fontWeight:700}}>${(parseFloat(newP)*(1-spread/100)).toFixed(4)}</span></div></div>)}
                  <button style={{...S.btn("p"),width:"100%"}} onClick={doUpdatePrice}>{t("updateBtn")}</button>
                  {prMsg&&<div style={S.msg(prMsg.startsWith("✅"))}>{prMsg}</div>}
                </div>
                <div style={{flex:1}}><div style={S.note}>{"📈 Price Guide\n\nEnter higher buy price.\nSell = buy × (1 - spread%)\nAll users see change instantly.\n\nTip: +0.3–1.5% daily."}</div></div>
              </div>
            </div>
            <div style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={S.ct}>{t("phTitle")}</div><span style={{fontSize:10,color:C.mu}}>Satıra tıkla → düzenle</span></div>
              <Chart history={prices}/>
              {phMsg&&<div style={{...S.msg(phMsg.startsWith("✅")),marginTop:8}}>{phMsg}</div>}
              <div style={{overflowX:"auto",marginTop:11}}><table style={S.tbl}><thead><tr>{["Date","Buy","Sell",t("dailyChg"),""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
                {[...prices].reverse().map((p,ri)=>{
                  const ri2=prices.length-1-ri;
                  const pp=prices[ri2-1];
                  const cv=pp?((parseFloat(p.buy)-parseFloat(pp.buy))/parseFloat(pp.buy)*100).toFixed(2):"—";
                  const ie=editP?.idx===ri2;
                  return(<tr key={ri} style={{cursor:"pointer"}} onClick={()=>!ie&&setEditP({idx:ri2,date:p.date,buy:String(p.buy)})}>
                    <td style={S.td}>{ie?<input style={{...S.inp,padding:"2px 6px",fontSize:11}} value={editP.date} onChange={e=>setEditP(v=>({...v,date:e.target.value}))}/>:p.date}</td>
                    <td style={{...S.td,color:C.G}}>{ie?<input style={{...S.inp,padding:"2px 6px",fontSize:11}} type="number" step="0.0001" value={editP.buy} onChange={e=>setEditP(v=>({...v,buy:e.target.value}))}/>:`$${parseFloat(p.buy).toFixed(4)}`}</td>
                    <td style={{...S.td,color:C.O}}>${(parseFloat(p.buy)*(1-spread/100)).toFixed(4)}</td>
                    <td style={S.td}>{cv!=="—"?<span style={{color:parseFloat(cv)>=0?C.G:C.R}}>{parseFloat(cv)>=0?"+":""}{cv}%</span>:"—"}</td>
                    <td style={S.td}>{ie?(<div style={{display:"flex",gap:3}}><button style={{...S.btn("p"),padding:"2px 7px",fontSize:10}} onClick={e=>{e.stopPropagation();saveEditedPrice();}}>✅</button><button style={{...S.btn("g"),padding:"2px 7px",fontSize:10}} onClick={e=>{e.stopPropagation();setEditP(null);}}>✕</button><button style={{...S.btn("s"),padding:"2px 7px",fontSize:10}} onClick={e=>{e.stopPropagation();delPrice(ri2);}}>🗑</button></div>):<span style={{fontSize:10,color:C.mu}}>✏️</span>}</td>
                  </tr>);
                })}
              </tbody></table></div>
            </div>
          </>)}

          {adminTab==="spread"&&(<div style={S.card}>
            <div style={S.ct}>💱 {t("spreadLbl")}</div>
            <div style={{fontSize:12,color:C.mu,marginBottom:12}}>Current: <span style={{color:C.G,fontWeight:700}}>{spread}%</span> — Buy: <span style={{color:C.G}}>${buyP.toFixed(4)}</span> / Sell: <span style={{color:C.O}}>${sellP.toFixed(4)}</span></div>
            <div style={{marginBottom:10}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>New % (0–50)</div><input style={{...S.inp,maxWidth:160}} type="number" step="0.1" min="0" max="50" placeholder="2" value={spreadIn} onChange={e=>{setSpreadIn(e.target.value);setSpreadMsg("");}}/></div>
            <button style={S.btn("p")} onClick={doSaveSpread}>{t("spreadSave")}</button>
            {spreadMsg&&<div style={S.msg(spreadMsg.startsWith("✅"))}>{spreadMsg}</div>}
          </div>)}

          {adminTab==="content"&&(<div style={S.card}>
            <div style={S.ct}>{t("cntTitle")}</div>
            {!editCards?(<>
              <div style={{...S.row,gap:8,marginBottom:11}}>{rc.map((c,i)=>(<div key={i} style={{flex:1,minWidth:120,background:C.bg,borderRadius:9,padding:11}}><div style={{fontSize:19,marginBottom:4}}>{c.icon}</div><div style={{fontWeight:600,fontSize:12,marginBottom:3}}>{c.title}</div><div style={{fontSize:11,color:C.mu}}>{c.desc}</div></div>))}</div>
              <button style={S.btn("p")} onClick={()=>setEditCards(rc.map(c=>({...c})))}>✏️ Edit</button>
              {cntMsg&&<div style={S.msg(true)}>{cntMsg}</div>}
            </>):(<>
              {editCards.map((c,i)=>(<div key={i} style={{background:C.bg,borderRadius:9,padding:11,marginBottom:8}}><div style={{...S.row,gap:6,alignItems:"center",marginBottom:6}}><input style={{...S.inp,width:50,flexShrink:0}} value={c.icon} onChange={e=>{const n=[...editCards];n[i]={...n[i],icon:e.target.value};setEditCards(n);}}/><input style={{...S.inp,flex:1}} value={c.title} onChange={e=>{const n=[...editCards];n[i]={...n[i],title:e.target.value};setEditCards(n);}}/></div><textarea style={{...S.inp,resize:"vertical",minHeight:50}} value={c.desc} onChange={e=>{const n=[...editCards];n[i]={...n[i],desc:e.target.value};setEditCards(n);}}/></div>))}
              <div style={{display:"flex",gap:6}}><button style={S.btn("p")} onClick={saveCards}>{t("saveBtn")}</button><button style={S.btn("g")} onClick={()=>setEditCards(null)}>{t("cancelBtn")}</button></div>
            </>)}
          </div>)}

          {adminTab==="users"&&(<div style={S.card}>
            <div style={S.ct}>{t("userTitle")}</div>
            <input style={{...S.inp,marginBottom:11}} placeholder={t("searchU")} value={uSearch} onChange={e=>setUSearch(e.target.value)}/>
            {fu.length===0?<div style={{textAlign:"center",color:C.mu,padding:"18px 0"}}>{t("noUsers")}</div>:(<div style={{overflowX:"auto"}}><table style={S.tbl}><thead><tr>{["User","Email","OPAY","USDT","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
              {fu.map(([uid,u])=>(<tr key={uid}><td style={S.td}><div style={{fontWeight:600,fontSize:12}}>{u.name}</div><div style={{fontSize:10,color:C.mu}}>@{u.username}{u.isAdmin?" 🔑":""}</div></td><td style={{...S.td,color:C.mu,fontSize:10}}>{u.email}</td><td style={{...S.td,color:C.G,fontSize:12}}>{(u.opay||0).toFixed(2)}</td><td style={{...S.td,fontSize:12}}>{(u.usdt||0).toFixed(2)}</td><td style={S.td}><div style={{display:"flex",gap:2,flexWrap:"wrap"}}>{[["addO",t("addO"),"p"],["remO",t("remO"),"s"],["addU",t("addU"),"p"],["remU",t("remU"),"s"]].map(([tp,lb,v])=>(<button key={tp} style={{...S.btn(v),padding:"2px 6px",fontSize:10}} onClick={()=>openAdj(uid,tp)}>{lb}</button>))}</div></td></tr>))}
            </tbody></table></div>)}
            {adjUser&&(<div style={{position:"fixed",inset:0,background:"#000b",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}><div style={{...S.card,width:280,margin:0}}><div style={{fontWeight:600,marginBottom:10,fontSize:12}}>{t("adjFor")} @{allUsers[adjUser]?.username}</div><input style={{...S.inp,marginBottom:8}} type="number" min="0" placeholder="0.00" value={adjAmt} onChange={e=>setAdjAmt(e.target.value)}/>{adjMsg&&<div style={S.msg(adjMsg.startsWith("✅"))}>{adjMsg}</div>}<div style={{display:"flex",gap:6,marginTop:10}}><button style={{...S.btn("p"),flex:1}} onClick={doAdj}>{t("applyBtn")}</button><button style={{...S.btn("g"),flex:1}} onClick={()=>{setAdjUser(null);setAdjMsg("");}}>{t("cancelBtn")}</button></div></div></div>)}
          </div>)}

          {adminTab==="cryptomus"&&(<div style={S.card}>
            <div style={S.ct}>{t("cmSetup")}</div>
            <div style={{...S.note,marginBottom:14,fontSize:11}}>{"1. cryptomus.com → Merchants → Create\n2. Merchant UUID → API Key\n3. Payment API Key → Secret\n4. Save"}</div>
            <div style={{marginBottom:10}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>Merchant UUID</div><input style={S.inp} placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" value={cmKey} onChange={e=>{setCmKey(e.target.value);setCmSaved(false);}}/></div>
            <div style={{marginBottom:12}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>Payment API Key</div><input style={S.inp} type="password" placeholder="••••••••" value={cmSec} onChange={e=>{setCmSec(e.target.value);setCmSaved(false);}}/></div>
            <button style={{...S.btn("p"),width:"100%"}} onClick={saveCM}>💾 Kaydet</button>
            {cmSaved&&<div style={S.msg(true)}>{t("cmSavedMsg")}</div>}
          </div>)}

          {adminTab==="wallets"&&(<div style={S.card}>
            <div style={S.ct}>💳 Tüm İstekler</div>
            {allWTxs.length===0?<div style={{textAlign:"center",color:C.mu,padding:"20px 0"}}>{t("noWalletTx")}</div>:(<div style={{overflowX:"auto"}}><table style={S.tbl}><thead><tr>{["UID","Type","Date","USDT","Status","Action"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>
              {allWTxs.map((tx,i)=>(<tr key={i}><td style={{...S.td,fontSize:10,color:C.mu}}>{tx.uid?.slice(0,6)}…</td><td style={S.td}><span style={{fontSize:10,fontWeight:600,color:tx.type==="deposit"?C.G:C.R}}>{tx.type==="deposit"?"⬇️":"⬆️"}</span></td><td style={{...S.td,color:C.mu,fontSize:10}}>{tx.date}</td><td style={{...S.td,color:C.G,fontWeight:600}}>{tx.amt?.toFixed(2)}</td><td style={S.td}><span style={{fontSize:10,fontWeight:600,color:tx.status==="done"?C.G:tx.status==="failed"?C.R:C.O}}>{tx.status==="done"?t("statusDone"):tx.status==="failed"?t("statusFailed"):t("statusPending")}</span></td><td style={S.td}>{tx.status==="pending"?(<div style={{display:"flex",gap:3}}><button style={{...S.btn("p"),padding:"2px 6px",fontSize:10}} onClick={()=>approveTx(tx)}>{t("approveBtn")}</button><button style={{...S.btn("s"),padding:"2px 6px",fontSize:10}} onClick={()=>rejectTx(tx)}>{t("rejectBtn")}</button></div>):<span style={{fontSize:10,color:C.mu}}>—</span>}</td></tr>))}
            </tbody></table></div>)}
          </div>)}
        </>)}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
