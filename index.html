// ─── CHART ───────────────────────────────────────────────────────────────────
function PriceChart({history}){
  const W=600,H=190,PL=52,PT=12,PR=16,PB=34;
  const pw=W-PL-PR,ph=H-PT-PB;
  const prices=history.map(h=>h.buy);
  const mn=Math.min(...prices)*0.97,mx=Math.max(...prices)*1.02;
  const x=(i)=>PL+i*(pw/(history.length-1));
  const y=(v)=>PT+ph-((v-mn)/(mx-mn))*ph;
  const pts=history.map((_,i)=>[x(i),y(history[i].buy)]);
  const line=pts.map((p,i)=>`${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const area=`${line} L${pts[pts.length-1][0]},${PT+ph} L${pts[0][0]},${PT+ph} Z`;
  const ticks=[mn,(mn+mx)/2,mx];
  const labs=[0,Math.floor(history.length/2),history.length-1];
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#00C896" stopOpacity="0.3"/>
          <stop offset="100%" stopColor="#00C896" stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      {ticks.map((t,i)=>(
        <g key={i}>
          <line x1={PL} y1={y(t)} x2={PL+pw} y2={y(t)} stroke="#ffffff0d" strokeWidth="1"/>
          <text x={PL-5} y={y(t)+4} textAnchor="end" fill="#556" fontSize="10">${t.toFixed(2)}</text>
        </g>
      ))}
      {labs.map(i=>(
        <text key={i} x={x(i)} y={H-4} textAnchor="middle" fill="#445" fontSize="9">{history[i].date.slice(0,7)}</text>
      ))}
      <path d={area} fill="url(#cg)"/>
      <path d={line} fill="none" stroke="#00C896" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="4" fill="#00C896" stroke="#0a1628" strokeWidth="2"/>
    </svg>
  );
}

  const [walletTxs,setWalletTxs]=useState([]);
  const [cmKey,setCmKey]=useState("");
  const [cmSec,setCmSec]=useState("");
  const [cmSaved,setCmSaved]=useState(false);

  const rtl=RTL.includes(lang);

  const last=prices[prices.length-1];
  const buyP=last.buy,sellP=last.sell;
  const prev=prices[prices.length-2]?.buy||buyP;
  const chgPct=((buyP-prev)/prev*100).toFixed(2);
  const isUp=parseFloat(chgPct)>=0;
  const cards=platformCards||DEFAULT_PLATFORM_CARDS(lang);

  const T=(key,vars)=>i(lang,key,vars);

  // ── AUTH ──
  function doLogin(){
    setAErr("");setAOk("");
    if(!aUser||!aPw){setAErr(T("errFields"));return;}
    const u=Object.entries(users).find(([k,v])=>(k===aUser||v.email===aUser)&&v.password===aPw);
    if(!u){setAErr(T("errLogin"));return;}
    setSession(u[0]);setPage("dashboard");
    setAUser("");setAPw("");
  }
  function doRegister(){
    setAErr("");setAOk("");
    if(!aName||!aUser||!aEmail||!aPw||!aCPw){setAErr(T("errFields"));return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(aEmail)){setAErr(T("errEmail"));return;}
    if(aPw!==aCPw){setAErr(T("errPwMatch"));return;}
    if(users[aUser]||Object.values(users).find(v=>v.email===aEmail)){setAErr(T("errExists"));return;}
    setUsers(prev=>({...prev,[aUser]:{password:aPw,name:aName,email:aEmail,usdt:0,opay:0,isAdmin:false}}));
    setAOk(T("okRegister"));setAuthMode("login");
    setAUser("");setAPw("");setACPw("");setAName("");setAEmail("");
  }
  function doLogout(){setSession(null);setPage("dashboard");setExMsg("");}

  // ── EXCHANGE ──
  function doExchange(){
    const amt=parseFloat(exAmt);
    if(!amt||amt<=0){setExMsg(T("errAmt"));return;}
    const u={...users[session]};
    if(exMode==="buy"){
      const cost=amt*buyP;
      if(cost>u.usdt){setExMsg(T("errUsdt"));return;}
      u.usdt-=cost;u.opay+=amt;
      setTxs(p=>[{id:Date.now(),user:session,type:"buy",opay:amt,usdt:cost,price:buyP,date:new Date().toISOString().slice(0,16).replace("T"," ")},...p]);
      setExMsg(T("msgBought",{amt:amt.toFixed(2),usdt:cost.toFixed(4)}));
    }else{
      if(amt>u.opay){setExMsg(T("errOpay"));return;}
      const get=amt*sellP;
      if(get<10){setExMsg(T("errMinSell"));return;}
      u.opay-=amt;u.usdt+=get;
      setTxs(p=>[{id:Date.now(),user:session,type:"sell",opay:amt,usdt:get,price:sellP,date:new Date().toISOString().slice(0,16).replace("T"," ")},...p]);
      setExMsg(T("msgSold",{amt:amt.toFixed(2),usdt:get.toFixed(4)}));
    }
    setUsers(p=>({...p,[session]:u}));setExAmt("");
  }

  // ── ADMIN PRICE ──
  function doUpdatePrice(){
    const p=parseFloat(newP);
    if(!p||p<=buyP){setPrMsg(T("errPrice"));return;}
    const s=parseFloat((p*0.98).toFixed(4));
    const today=new Date().toISOString().slice(0,10);
    setPrices(prev=>[...prev,{date:today,buy:p,sell:s}]);
    setPrMsg(T("msgPriceOk",{buy:p,sell:s}));setNewP("");

    const amt=parseFloat(adjAmt);
    if(!amt||amt<0){setAdjMsg("Enter valid amount.");return;}
    setUsers(prev=>{
      const u={...prev[adjUser]};
      if(adjType==="addO") u.opay+=amt;
      else if(adjType==="remO") u.opay=Math.max(0,u.opay-amt);
      else if(adjType==="addU") u.usdt+=amt;
      else if(adjType==="remU") u.usdt=Math.max(0,u.usdt-amt);
      return {...prev,[adjUser]:u};
    });
    setAdjMsg(T("msgBalOk"));setAdjAmt("");
  }

  // ── WALLET: DEPOSIT via Cryptomus ──
  async function doDeposit(){
    setDepMsg("");
    const amt=parseFloat(depAmt);
    if(!amt||amt<=0){setDepMsg(T("errAmt2"));return;}
    if(!cmKey||!cmSec){setDepMsg("⚠️ Cryptomus API keys not configured. Ask admin.");return;}
    const orderId="DEP-"+Date.now()+"-"+session;
    const body={amount:String(amt),currency:"USD",order_id:orderId,url_return:window.location.href,url_callback:window.location.href,network:depNet,to_currency:depCoin,lifetime:3600};
    const sign=await makeCryptomusSign(body,cmSec);
    try{
      const res=await fetch("https://api.cryptomus.com/v1/payment",{
        method:"POST",
        headers:{"merchant":cmKey,"sign":sign,"Content-Type":"application/json"},
        body:JSON.stringify(body)
      });
      const data=await res.json();
      if(data?.result?.url){
        setWalletTxs(prev=>[{id:orderId,type:"deposit",amt,coin:depCoin,net:depNet,status:"pending",date:new Date().toISOString().slice(0,16).replace("T"," "),user:session},...prev]);
        setDepMsg(T("depPending"));
        setTimeout(()=>window.open(data.result.url,"_blank"),1000);
      } else {
        setDepMsg("⚠️ "+(data?.errors?.join(", ")||data?.message||"Cryptomus error. Check API keys."));
      }
    }catch(e){setDepMsg("⚠️ Network error: "+e.message);}
  }

  async function makeCryptomusSign(body,secret){
    const str=btoa(JSON.stringify(body));
    const enc=new TextEncoder();
    const key=await crypto.subtle.importKey("raw",enc.encode(secret),{name:"HMAC",hash:"MD5"},false,["sign"]);
    const sig=await crypto.subtle.sign("HMAC",key,enc.encode(str));
    return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }

                <div style={s.ct}>{T("depHistory")}</div>
                {walletTxs.length===0?(
                  <div style={{textAlign:"center",color:"#3a5a8a",padding:"36px 0",fontSize:14}}>{T("noWalletTx")}</div>
                ):(
                  <div style={{overflowX:"auto"}}>
                    <table style={s.tbl}>
                      <thead><tr>
                        {["Type",T("colDate"),T("colUsdt"),"Coin/Net",T("colStatus")].map(h=><th key={h} style={s.th}>{h}</th>)}
                      </tr></thead>
                      <tbody>
                        {walletTxs.map(tx=>(
                          <tr key={tx.id}>
                            <td style={s.td}>
                              <span style={{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:600,
                                background:tx.type==="deposit"?"#00C89615":"#f0406015",
                                color:tx.type==="deposit"?"#00C896":"#f04060"}}>
                                {tx.type==="deposit"?"⬇️ DEP":"⬆️ WD"}
                              </span>
                            </td>
                            <td style={{...s.td,color:"#3a5a8a",fontSize:12}}>{tx.date}</td>
                            <td style={{...s.td,...s.G,fontWeight:600}}>{tx.amt.toFixed(2)}</td>
                            <td style={{...s.td,color:"#8a9ab8",fontSize:12}}>{tx.coin||"USDT"} / {tx.net}</td>
                            <td style={s.td}>
                              <span style={{fontSize:11,fontWeight:600,
                                color:tx.status==="done"?"#00C896":tx.status==="failed"?"#f04060":"#ff9f4a"}}>
                                {tx.status==="done"?T("statusDone"):tx.status==="failed"?T("statusFailed"):T("statusPending")}
                              </span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── ADMIN ── */}
        {page==="admin"&&cur.isAdmin&&(
          <>
            <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap"}}>
              {["price","content","users","cryptomus"].map(t=>(
                <button key={t} style={s.aTab(adminTab===t)} onClick={()=>setAdminTab(t)}>
                  {t==="price"?"📈 "+T("adminPrice"):t==="content"?"✏️ "+T("cntTitle").split("(")[0].trim():t==="users"?"👥 "+T("userTitle"):"🔑 Cryptomus"}
                </button>
              ))}
            </div>

            {/* PRICE TAB */}
            {adminTab==="price"&&(
              <>
                <div style={s.card}>
                  <div style={s.ct}>{T("adminPrice")}</div>
                  <div style={s.row}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,marginBottom:8}}><span style={{color:"#3a5a8a"}}>{T("curBuy")} </span><span style={{...s.G,fontWeight:700}}>${buyP.toFixed(4)}</span></div>
                      <div style={{fontSize:12,color:"#3a5a8a",marginBottom:7}}>{T("newBuyLbl")}</div>
                      <input style={{...s.inp,marginBottom:10}} type="number" step="0.0001" min={buyP} placeholder={(buyP*1.01).toFixed(4)} value={newP} onChange={e=>setNewP(e.target.value)}/>
                      {newP&&parseFloat(newP)>buyP&&(
                        <div style={{background:"#060d1a",borderRadius:8,padding:11,fontSize:13,marginBottom:10}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#3a5a8a"}}>{T("newBuyRow")}</span><span style={{...s.G,fontWeight:700}}>${parseFloat(newP).toFixed(4)}</span></div>
                          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#3a5a8a"}}>{T("newSellRow")}</span><span style={{...s.O,fontWeight:700}}>${(parseFloat(newP)*0.98).toFixed(4)}</span></div>
                        </div>
                      )}
                      <button style={{...s.btn("primary"),width:"100%"}} onClick={doUpdatePrice}>{T("updateBtn")}</button>
                      {prMsg&&<div style={s.msg(prMsg.startsWith("✅"))}>{prMsg}</div>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={s.note}><b style={s.G}>{T("guideTitle")}</b>{"\n\n"}{T("guideBody")}</div>
                    </div>
                  </div>
                </div>
                <div style={s.card}>
                  <div style={s.ct}>{T("phTitle")}</div>
                  <PriceChart history={prices}/>
                  <div style={{overflowX:"auto",marginTop:14}}>
                    <table style={s.tbl}>
                      <thead><tr>{["Date","Buy","Sell",T("dailyChg")].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
                      <tbody>
                        {[...prices].reverse().slice(0,10).map((p,i,arr)=>{
                          const prev2=arr[i+1];
                          const chg=prev2?((p.buy-prev2.buy)/prev2.buy*100).toFixed(2):"—";
                          return(
                            <tr key={i}>
                              <td style={{...s.td,color:"#3a5a8a"}}>{p.date}</td>
                              <td style={{...s.td,...s.G}}>${p.buy.toFixed(4)}</td>
                              <td style={{...s.td,...s.O}}>${p.sell.toFixed(4)}</td>
                              <td style={s.td}>{chg!=="—"?<span style={parseFloat(chg)>=0?s.G:s.R}>{parseFloat(chg)>=0?"+":""}{chg}%</span>:"—"}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </>
            )}

            {/* CONTENT TAB */}
            {adminTab==="content"&&(
              <div style={s.card}>
                <div style={s.ct}>{T("cntTitle")}</div>
                <div style={{fontSize:13,color:"#3a5a8a",marginBottom:16}}>{T("cntDesc")}</div>
                {!editCards?(
                  <>
                    <div style={{...s.row,gap:10,marginBottom:16}}>
                      {cards.map((c,i)=>(
                        <div key={i} style={{flex:1,minWidth:150,background:"#060d1a",borderRadius:10,padding:14}}>
                          <div style={{fontSize:22,marginBottom:6}}>{c.icon}</div>
                          <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>{c.title}</div>
                          <div style={{fontSize:12,color:"#3a5a8a"}}>{c.desc}</div>
                        </div>
                      ))}
                    </div>
                    <button style={s.btn("primary")} onClick={startEditCards}>✏️ Edit</button>
                    {cntMsg&&<div style={s.msg(true)}>{cntMsg}</div>}
                  </>
                ):(
                  <>
                    {editCards.map((c,i)=>(
                      <div key={i} style={{background:"#060d1a",borderRadius:10,padding:14,marginBottom:10}}>
                        <div style={{...s.row,gap:8,alignItems:"center"}}>
                          <input style={{...s.inp,width:60,flexShrink:0}} value={c.icon} onChange={e=>{const n=[...editCards];n[i]={...n[i],icon:e.target.value};setEditCards(n);}}/>
                          <input style={{...s.inp,flex:1}} value={c.title} onChange={e=>{const n=[...editCards];n[i]={...n[i],title:e.target.value};setEditCards(n);}}/>
                        </div>
                        <textarea style={{...s.inp,marginTop:8,resize:"vertical",minHeight:60}} value={c.desc} onChange={e=>{const n=[...editCards];n[i]={...n[i],desc:e.target.value};setEditCards(n);}}/>
                      </div>
                    ))}
                    <div style={{display:"flex",gap:8,marginTop:4}}>
                      <button style={s.btn("primary")} onClick={saveCards}>{T("saveBtn")}</button>
                      <button style={s.btn("ghost")} onClick={()=>setEditCards(null)}>{T("cancelBtn")}</button>
                    </div>
                  </>
                )}
              </div>
            )}

            {/* USERS TAB */}
            {adminTab==="users"&&(
              <div style={s.card}>
                <div style={s.ct}>{T("userTitle")}</div>
                <div style={{fontSize:13,color:"#3a5a8a",marginBottom:14}}>{T("userDesc")}</div>
                <input style={{...s.inp,marginBottom:16}} placeholder={T("searchU")} value={uSearch} onChange={e=>setUSearch(e.target.value)}/>
                {filteredUsers.length===0?(
                  <div style={{textAlign:"center",color:"#3a5a8a",padding:"24px 0"}}>{T("noUsers")}</div>
                ):(
                  <div style={{overflowX:"auto"}}>
                    <table style={s.tbl}>
                      <thead><tr>{[T("cU"),T("cE"),T("cO"),T("cUsd"),T("cA")].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
                      <tbody>
                        {filteredUsers.map(([k,v])=>(
                          <tr key={k}>
                            <td style={s.td}><div style={{fontWeight:600}}>{v.name}</div><div style={{fontSize:11,color:"#3a5a8a"}}>@{k}{v.isAdmin?" 🔑":""}</div></td>
                            <td style={{...s.td,color:"#3a5a8a",fontSize:12}}>{v.email}</td>
                            <td style={{...s.td,...s.G}}>{v.opay.toFixed(2)}</td>
                            <td style={s.td}>{v.usdt.toFixed(2)}</td>
                            <td style={s.td}>
                              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                                {[["addO",T("addO"),"primary"],["remO",T("remO"),"sell"],["addU",T("addU"),"primary"],["remU",T("remU"),"sell"]].map(([type,label,variant])=>(
                                  <button key={type} style={{...s.btn(variant),padding:"4px 9px",fontSize:11}} onClick={()=>openAdj(k,type)}>{label}</button>
                                ))}
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* BALANCE ADJUST MODAL */}
                {adjUser&&(
                  <div style={{position:"fixed",inset:0,background:"#000000a0",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
                    <div style={{...s.card,width:340,margin:0}}>
                      <div style={{fontWeight:600,marginBottom:14}}>{T("adjFor")} @{adjUser}</div>
                      <div style={{fontSize:12,color:"#3a5a8a",marginBottom:6}}>{T("amtLbl")}</div>
                      <input style={{...s.inp,marginBottom:12}} type="number" min="0" placeholder="0.00" value={adjAmt} onChange={e=>setAdjAmt(e.target.value)}/>
                      {adjMsg&&<div style={s.msg(adjMsg.startsWith("✅"))}>{adjMsg}</div>}
                      <div style={{display:"flex",gap:8,marginTop:12}}>
                        <button style={{...s.btn("primary"),flex:1}} onClick={doAdj}>{T("applyBtn")}</button>
                        <button style={{...s.btn("ghost"),flex:1}} onClick={()=>{setAdjUser(null);setAdjMsg("");}}>{T("cancelBtn")}</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* CRYPTOMUS TAB */}
            {adminTab==="cryptomus"&&(
              <div style={s.card}>
                <div style={s.ct}>🔑 Cryptomus API Setup</div>
                <div style={{...s.note,marginBottom:20,fontSize:13}}>
                  <b style={{color:"#00C896"}}>How to get your keys:</b>{"\n\n"}
                  1. Go to <b>cryptomus.com</b> → Sign up / Login{"\n"}
                  2. Dashboard → <b>Merchants</b> → Create a merchant{"\n"}
                  3. Copy your <b>Merchant UUID</b> (API Key) and <b>Payment API Key</b> (Secret){"\n"}
                  4. Paste them below and click Save{"\n\n"}
                  These keys are stored in your browser only (not on any server).{"\n"}
                  Users will see a deposit form — on payment, Cryptomus redirects them back here.
                </div>

                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,color:"#3a5a8a",marginBottom:6}}>{T("cryptomusKey")} (Merchant UUID)</div>
                  <input
                    style={s.inp}
                    placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
                    value={cmKey}
                    onChange={e=>{setCmKey(e.target.value);setCmSaved(false);}}
                  />
                </div>
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:12,color:"#3a5a8a",marginBottom:6}}>{T("cryptomusSec")} (Payment API Key)</div>
                  <input
                    style={s.inp}
                    type="password"
                    placeholder="Your Cryptomus Payment Secret"
                    value={cmSec}
                    onChange={e=>{setCmSec(e.target.value);setCmSaved(false);}}
                  />
                </div>
                <button
                  style={{...s.btn("primary"),width:"100%"}}
                  onClick={()=>setCmSaved(true)}
                >
                  💾 Save API Keys
                </button>
                {cmSaved&&(
                  <div style={s.msg(true)}>✅ Keys saved! Users can now deposit via Cryptomus.</div>
                )}

                <div style={{marginTop:24}}>
                  <div style={{...s.ct,marginBottom:12}}>📋 All Deposit / Withdrawal Requests</div>
                  {walletTxs.length===0?(
                    <div style={{textAlign:"center",color:"#3a5a8a",padding:"24px 0",fontSize:13}}>{T("noWalletTx")}</div>
                  ):(
                    <div style={{overflowX:"auto"}}>
                      <table style={s.tbl}>
                        <thead><tr>
                          {["User","Type",T("colDate"),T("colUsdt"),"Net",T("colStatus"),"Action"].map(h=>(
                            <th key={h} style={s.th}>{h}</th>
                          ))}
                        </tr></thead>
                        <tbody>
                          {walletTxs.map((tx,idx)=>(
                            <tr key={tx.id}>
                              <td style={{...s.td,color:"#8a9ab8",fontSize:12}}>{tx.user||session}</td>
                              <td style={s.td}>
                                <span style={{fontSize:11,fontWeight:600,color:tx.type==="deposit"?"#00C896":"#f04060"}}>
                                  {tx.type==="deposit"?"⬇️ DEP":"⬆️ WD"}
                                </span>
                              </td>
                              <td style={{...s.td,color:"#3a5a8a",fontSize:12}}>{tx.date}</td>
                              <td style={{...s.td,...s.G,fontWeight:600}}>{tx.amt.toFixed(2)}</td>
                              <td style={{...s.td,fontSize:12,color:"#8a9ab8"}}>{tx.net}</td>
                              <td style={s.td}>
                                <span style={{fontSize:11,fontWeight:600,
                                  color:tx.status==="done"?"#00C896":tx.status==="failed"?"#f04060":"#ff9f4a"}}>
                                  {tx.status==="done"?T("statusDone"):tx.status==="failed"?T("statusFailed"):T("statusPending")}
                                </span>
                              </td>
                              <td style={s.td}>
                                <div style={{display:"flex",gap:5}}>
                                  {tx.status==="pending"&&(
                                    <>
                                      <button
                                        style={{...s.btn("primary"),padding:"3px 9px",fontSize:11}}
                                        onClick={()=>{
                                          const updated=[...walletTxs];
                                          updated[idx]={...tx,status:"done"};
                                          if(tx.type==="deposit"){
                                            setUsers(prev=>{
                                              const u={...prev[tx.user||session]};
                                              u.usdt+=tx.amt;
                                              return{...prev,[tx.user||session]:u};
                                            });
                                          }
                                          setWalletTxs(updated);
                                        }}
                                      >✅ Approve</button>
                                      <button
                                        style={{...s.btn("sell"),padding:"3px 9px",fontSize:11}}
                                        onClick={()=>{
                                          const updated=[...walletTxs];
                                          updated[idx]={...tx,status:"failed"};
                                          if(tx.type==="withdraw"){
                                            setUsers(prev=>{
                                              const u={...prev[tx.user||session]};
                                              u.usdt+=tx.amt;
                                              return{...prev,[tx.user||session]:u};
                                            });
                                          }
                                          setWalletTxs(updated);
                                        }}
                                      >❌ Reject</button>
                                    </>
                                  )}
                                  {tx.status!=="pending"&&(
                                    <span style={{fontSize:11,color:"#3a5a8a"}}>—</span>
                                  )}
                                </div>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
