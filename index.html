<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OPAY TOKEN</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060d1a;font-family:system-ui,sans-serif;color:#dde4f0;font-size:14px}
input,button,select,textarea{font-family:inherit;font-size:13px}
button{cursor:pointer}
.card{background:#0b1525;border:1px solid #172340;border-radius:11px;padding:16px;margin-bottom:12px}
.inp{background:#050c18;border:1px solid #172340;border-radius:7px;padding:8px 10px;color:#dde4f0;width:100%;outline:none;box-sizing:border-box}
.btn-p{background:linear-gradient(135deg,#00C896,#0088cc);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-weight:600;cursor:pointer}
.btn-s{background:linear-gradient(135deg,#f04060,#aa1133);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-weight:600;cursor:pointer}
.btn-g{background:#172340;color:#fff;border:none;border-radius:7px;padding:9px 16px;font-weight:600;cursor:pointer}
.btn-p:disabled,.btn-s:disabled{opacity:0.5;cursor:not-allowed}
.hdr{background:#0b1525;border-bottom:1px solid #172340;padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.nav{display:flex;gap:2px;overflow-x:auto}
.nav button{background:transparent;color:#3a5a8a;border:none;border-radius:6px;padding:5px 9px;font-size:11px;white-space:nowrap}
.nav button.active{background:#00C89615;color:#00C896;font-weight:600}
.main{max-width:860px;margin:0 auto;padding:16px 9px}
.row{display:flex;gap:9px;flex-wrap:wrap}
.stat{flex:1;min-width:100px;background:#080f1c;border:1px solid #172340;border-radius:9px;padding:11px}
.logo-ico{width:28px;height:28px;background:linear-gradient(135deg,#00C896,#0066cc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:600;color:#3a5a8a;padding:4px 6px;border-bottom:1px solid #172340}
td{padding:7px 6px;border-bottom:1px solid #0b1525;font-size:12px}
select{background:#050c18;border:1px solid #172340;border-radius:7px;padding:8px 10px;color:#dde4f0;width:100%;outline:none}
.msg-ok{color:#00C896;font-size:12px;margin-top:7px}
.msg-er{color:#f04060;font-size:12px;margin-top:7px}
.spin{text-align:center;padding:40px 0;color:#3a5a8a;font-size:12px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ========================================
// CONFIG
// ========================================
var API_URL = "https://opay-backend-production.up.railway.app";

// ========================================
// API HELPER - all real data comes from the backend.
// Only the auth token itself lives in localStorage (needed as a fallback
// since cross-site cookies are blocked by default in modern browsers).
// User data, passwords, and balances are never cached client-side.
// ========================================
function api(path, method, body) {
  var m = (method || "GET").toUpperCase();
  var opts = {
    method: m,
    credentials: "include",
    headers: { "Content-Type": "application/json" }
  };
  // Primary auth path: Authorization header with a Bearer token. Many
  // browsers now block cross-site cookies by default (frontend on
  // github.io, backend on railway.app are different sites), so the
  // httpOnly cookie the server also sets can silently fail to be stored/
  // sent. The token is kept in localStorage and attached here instead -
  // this works regardless of third-party cookie settings.
  if (state.token) {
    opts.headers["Authorization"] = "Bearer " + state.token;
  }
  // CSRF defense-in-depth: the token is only ever handed to us inside a JSON
  // response body (never as a readable cookie), so a malicious third-party
  // site cannot obtain it and cannot forge this header - even though the
  // browser would still attach our auth cookie to a cross-site request.
  if (m !== "GET" && state.csrfToken) {
    opts.headers["X-CSRF-Token"] = state.csrfToken;
  }
  if (body !== undefined) opts.body = JSON.stringify(body);
  return fetch(API_URL + path, opts).then(function(res) {
    return res.text().then(function(text) {
      var data;
      try { data = text ? JSON.parse(text) : {}; } catch (e) { data = {}; }
      if (!res.ok) {
        var err = new Error(data.error || "Istek basarisiz (" + res.status + ")");
        throw err;
      }
      return data;
    });
  });
}

function h(str) {
  return String(str == null ? "" : str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ========================================
// STATE - only holds data fetched from backend for the current session.
// ========================================
var state = {
  booting: true,       // true while checking session on first load
  cur: null,            // current user, from /api/auth/me
  csrfToken: null,       // in-memory only, never persisted
  // Bearer token, kept in localStorage so it survives page refresh. This is
  // a deliberate trade-off: it's JS-readable (unlike an httpOnly cookie),
  // but it's the only reliable option now that cross-site cookies are
  // blocked by default in modern browsers for a frontend/backend split
  // across two different domains. Mitigated by the fact this codebase has
  // no known XSS vector (all output is escaped via h()).
  token: localStorage.getItem("opay_token") || null,
  page: "dashboard",
  authMode: "login",
  adminTab: "price",
  wTab: "deposit",
  exMode: "buy",

  priceInfo: null,       // {buyPrice, sellPrice, spread}
  priceHistory: [],      // [{buy, date}]
  cards: [],
  txs: [],
  wtxs: [],

  adminUsers: [],
  adminPrices: [],       // with ids
  adminWtxs: [],

  busy: false,           // generic "request in flight" flag for buttons
  errAuth: ""
};

// ========================================
// BOOTSTRAP
// ========================================
function boot() {
  if (!state.token) {
    state.booting = false;
    render();
    return;
  }
  api("/api/auth/me").then(function(u) {
    state.cur = u;
    state.csrfToken = u.csrfToken;
    state.booting = false;
    render();
    loadDashboardData();
  }).catch(function() {
    state.cur = null;
    state.csrfToken = null;
    state.token = null;
    localStorage.removeItem("opay_token");
    state.booting = false;
    render();
  });
}

function loadDashboardData() {
  api("/api/price").then(function(p) { state.priceInfo = p; render(); }).catch(function(){});
  api("/api/prices").then(function(p) { state.priceHistory = p; render(); }).catch(function(){});
  api("/api/cards").then(function(c) { state.cards = c; render(); }).catch(function(){});
}

function refreshMe() {
  return api("/api/auth/me").then(function(u) { state.cur = u; state.csrfToken = u.csrfToken; });
}

// ========================================
// CHART
// ========================================
function makeChart() {
  var history = state.priceHistory;
  if (!history || history.length < 2) return '<div style="text-align:center;color:#3a5a8a;font-size:12px;padding:20px 0">Grafik icin yeterli veri yok.</div>';
  var W=520, H=150, PL=42, PT=8, PR=8, PB=24;
  var pw = W-PL-PR, ph = H-PT-PB;
  var ps = history.map(function(p) { return parseFloat(p.buy); });
  var mn = Math.min.apply(null,ps)*0.97;
  var mx = Math.max.apply(null,ps)*1.02;
  var xi = function(i) { return PL + i*(pw/(history.length-1)); };
  var yi = function(v) { return PT + ph - ((v-mn)/(mx-mn))*ph; };
  var pts = history.map(function(_,i) { return [xi(i), yi(ps[i])]; });
  var line = pts.map(function(p,i) { return (i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" ");
  var area = line + " L"+pts[pts.length-1][0]+","+(PT+ph)+" L"+pts[0][0]+","+(PT+ph)+" Z";
  var ticks = [mn, (mn+mx)/2, mx];
  var ticksSvg = ticks.map(function(t) {
    return '<line x1="'+PL+'" y1="'+yi(t).toFixed(1)+'" x2="'+(PL+pw)+'" y2="'+yi(t).toFixed(1)+'" stroke="#ffffff08" stroke-width="1"/>'+
           '<text x="'+(PL-3)+'" y="'+(yi(t)+4).toFixed(1)+'" text-anchor="end" fill="#445" font-size="10">$'+t.toFixed(2)+'</text>';
  }).join("");
  var labIdx = [0, Math.floor(history.length/2), history.length-1];
  var labsSvg = labIdx.map(function(i) {
    return '<text x="'+xi(i).toFixed(1)+'" y="'+(H-2)+'" text-anchor="middle" fill="#445" font-size="9">'+h(history[i].date.slice(0,7))+'</text>';
  }).join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'+
    '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="#00C896" stop-opacity="0.3"/>'+
    '<stop offset="100%" stop-color="#00C896" stop-opacity="0.02"/></linearGradient></defs>'+
    ticksSvg + labsSvg +
    '<path d="'+area+'" fill="url(#g)"/>'+
    '<path d="'+line+'" fill="none" stroke="#00C896" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+
    '<circle cx="'+pts[pts.length-1][0].toFixed(1)+'" cy="'+pts[pts.length-1][1].toFixed(1)+'" r="4" fill="#00C896" stroke="#0a1628" stroke-width="2"/>'+
    '</svg>';
}

// ========================================
// RENDER
// ========================================
function render() {
  var app = document.getElementById("app");
  if (!app) return;

  if (state.booting) {
    app.innerHTML = '<div class="spin">Yukleniyor...</div>';
    return;
  }

  if (!state.cur) {
    renderAuth(app);
    return;
  }

  var buyP = state.priceInfo ? state.priceInfo.buyPrice : 0;
  var sellP = state.priceInfo ? state.priceInfo.sellPrice : 0;
  var spread = state.priceInfo ? state.priceInfo.spread : 0;
  var cur = state.cur;
  var isAdmin = cur.isAdmin;

  var navItems = [
    {id:"dashboard",label:"Panel"},
    {id:"exchange",label:"Exchange"},
    {id:"history",label:"Gecmis"},
    {id:"wallet",label:"Cuzdan"}
  ];
  if (isAdmin) navItems.push({id:"admin",label:"Admin"});

  var navHtml = navItems.map(function(n) {
    return '<button class="'+(state.page===n.id?"active":"")+'" onclick="setPage(\''+n.id+'\')">'+h(n.label)+'</button>';
  }).join("");

  var pageHtml = "";
  if (state.page === "dashboard") pageHtml = renderDashboard(buyP, sellP, spread, cur);
  else if (state.page === "exchange") pageHtml = renderExchange(buyP, sellP, cur);
  else if (state.page === "history") pageHtml = renderHistory();
  else if (state.page === "wallet") pageHtml = renderWallet(cur);
  else if (state.page === "admin" && isAdmin) pageHtml = renderAdmin(buyP, spread);

  app.innerHTML =
    '<div class="hdr">'+
    '<div style="display:flex;align-items:center;gap:7px;flex-shrink:0"><div class="logo-ico">OP</div><span style="font-weight:700;font-size:14px;color:#fff">OPAY TOKEN</span></div>'+
    '<div class="nav">'+navHtml+'</div>'+
    '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'+
    '<span style="font-size:11px;color:#3a5a8a">'+h(cur.fullName || cur.username)+'</span>'+
    '<button class="btn-g" style="padding:4px 9px;font-size:11px" onclick="doLogout()">Cikis</button>'+
    '</div></div>'+
    '<div class="main">'+pageHtml+'</div>';
}

// -- AUTH SCREEN --
function renderAuth(app) {
  app.innerHTML = '<div class="hdr"><div style="display:flex;align-items:center;gap:7px"><div class="logo-ico">OP</div><span style="font-weight:700;font-size:14px;color:#fff">OPAY TOKEN</span></div></div>'+
  '<div style="max-width:360px;margin:40px auto 0;padding:0 10px"><div class="card" style="padding:22px">'+
  '<div style="text-align:center;margin-bottom:18px">'+
  '<div class="logo-ico" style="width:44px;height:44px;font-size:17px;margin:0 auto 10px">OP</div>'+
  '<div style="font-weight:700;font-size:17px;color:#fff">'+(state.authMode==="login"?"Hos Geldiniz":"Hesap Olusturun")+'</div>'+
  '<div style="color:#3a5a8a;font-size:11px;margin-top:2px">OPAY TOKEN Platformu</div></div>'+
  (state.authMode==="register"?
    '<div style="margin-bottom:8px"><div style="font-size:11px;color:#3a5a8a;margin-bottom:3px">Ad Soyad</div><input class="inp" id="aName" placeholder="Ad Soyad"/></div>'+
    '<div style="margin-bottom:8px"><div style="font-size:11px;color:#3a5a8a;margin-bottom:3px">Kullanici Adi</div><input class="inp" id="aUser" placeholder="kullanici_adi"/></div>'
  : "") +
  '<div style="margin-bottom:8px"><div style="font-size:11px;color:#3a5a8a;margin-bottom:3px">'+(state.authMode==="login"?"E-posta veya Kullanici Adi":"E-posta")+'</div><input class="inp" id="aEmail" placeholder="email@example.com"/></div>'+
  '<div style="margin-bottom:'+(state.authMode==="register"?"8":"13")+'px"><div style="font-size:11px;color:#3a5a8a;margin-bottom:3px">Sifre</div><input class="inp" id="aPw" type="password" placeholder="........"/></div>'+
  (state.authMode==="register"?'<div style="margin-bottom:13px"><div style="font-size:11px;color:#3a5a8a;margin-bottom:3px">Sifre Tekrar</div><input class="inp" id="aCPw" type="password" placeholder="........"/></div>':"") +
  '<div id="authMsg">'+(state.errAuth?'<div class="msg-er">'+h(state.errAuth)+'</div>':'')+'</div>'+
  '<button class="btn-p" style="width:100%;margin-top:11px" '+(state.busy?"disabled":"")+' onclick="doAuth()">'+(state.busy?"Lutfen bekleyin...":(state.authMode==="login"?"Giris Yap":"Hesap Olustur"))+'</button>'+
  '<div style="margin-top:11px;font-size:12px;color:#3a5a8a;text-align:center">'+
  (state.authMode==="login"?"Hesabiniz yok mu?":"Hesabiniz var mi?")+
  ' <span style="color:#00C896;cursor:pointer;font-weight:600" onclick="toggleAuth()">'+(state.authMode==="login"?"Uye olun":"Giris yapin")+'</span></div>'+
  '</div></div>';
}

// -- DASHBOARD --
function renderDashboard(buyP, sellP, spread, cur) {
  var opayVal = ((cur.opay||0)*sellP).toFixed(2);
  var hist = state.priceHistory;
  var prev = hist.length > 1 ? parseFloat(hist[hist.length-2].buy) : buyP;
  var chg = prev ? (((buyP - prev) / prev) * 100).toFixed(2) : "0.00";
  var isUp = parseFloat(chg) >= 0;
  var cardsHtml = state.cards.length ? state.cards.map(function(c) {
    return '<div style="flex:1;min-width:120px;background:#060d1a;border-radius:9px;padding:11px"><div style="font-size:19px;margin-bottom:4px">'+h(c.icon)+'</div><div style="font-weight:600;font-size:12px;margin-bottom:3px">'+h(c.title)+'</div><div style="font-size:11px;color:#3a5a8a">'+h(c.desc)+'</div></div>';
  }).join("") : '<div class="spin">Yukleniyor...</div>';

  return '<div class="row">'+
  '<div class="stat"><div style="font-size:10px;color:#3a5a8a;font-weight:600;margin-bottom:3px">Alis Fiyati</div><div style="font-size:19px;font-weight:700;color:#00C896">$'+buyP.toFixed(4)+'</div><div style="font-size:10px;color:'+(isUp?"#00C896":"#f04060")+'">'+(isUp?"^":"v")+Math.abs(chg)+'%</div></div>'+
  '<div class="stat"><div style="font-size:10px;color:#3a5a8a;font-weight:600;margin-bottom:3px">Satis Fiyati</div><div style="font-size:19px;font-weight:700;color:#ff9f4a">$'+sellP.toFixed(4)+'</div><div style="font-size:10px;color:#3a5a8a">Spread: '+spread+'%</div></div>'+
  '<div class="stat"><div style="font-size:10px;color:#3a5a8a;font-weight:600;margin-bottom:3px">OPAY Bakiye</div><div style="font-size:19px;font-weight:700">'+(cur.opay||0).toFixed(2)+'</div><div style="font-size:10px;color:#00C896">$'+opayVal+'</div></div>'+
  '<div class="stat"><div style="font-size:10px;color:#3a5a8a;font-weight:600;margin-bottom:3px">USDT Bakiye</div><div style="font-size:19px;font-weight:700">'+(cur.usdt||0).toFixed(2)+'</div></div>'+
  '</div>'+
  '<div class="card"><div style="font-size:10px;font-weight:700;color:#3a5a8a;text-transform:uppercase;margin-bottom:10px">Fiyat Grafigi</div>'+makeChart()+'</div>'+
  '<div class="card"><div style="font-size:10px;font-weight:700;color:#3a5a8a;text-transform:uppercase;margin-bottom:10px">Platform Bilgisi</div>'+
  '<div class="row" style="gap:8px">'+cardsHtml+'</div></div>';
}

// -- EXCHANGE --
function renderExchange(buyP, sellP, cur) {
  return '<div style="max-width:440px;margin:0 auto"><div class="card">'+
  '<div style="font-size:10px;font-weight:700;color:#3a5a8a;text-transform:uppercase;margin-bottom:10px">Exchange</div>'+
  '<div class="row" style="gap:8px;margin-bottom:12px">'+
  '<div style="flex:1;background:#060d1a;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#3a5a8a;margin-bottom:2px">Alis</div><div style="font-weight:700;font-size:16px;color:#00C896">$'+buyP.toFixed(4)+'</div></div>'+
  '<div style="flex:1;background:#060d1a;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#3a5a8a;margin-bottom:2px">Satis</div><div style="font-weight:700;font-size:16px;color:#ff9f4a">$'+sellP.toFixed(4)+'</div></div>'+
  '</div>'+
  '<div style="background:#060d1a;border-radius:8px;padding:10px;margin-bottom:11px;font-size:12px">'+
  '<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="color:#3a5a8a">OPAY:</span><span style="font-weight:600">'+(cur.opay||0).toFixed(2)+'</span></div>'+
  '<div style="display:flex;justify-content:space-between"><span style="color:#3a5a8a">USDT:</span><span style="font-weight:600">'+(cur.usdt||0).toFixed(2)+'</span></div>'+
  '</div>'+
  '<div style="display:flex;gap:3px;margin-bottom:11px;background:#060d1a;border-radius:8px;padding:3px">'+
  '<button style="flex:1;padding:7px 0;border:none;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer;background:'+(state.exMode==="buy"?"linear-gradient(135deg,#00C896,#0088cc)":"transparent")+';color:'+(state.exMode==="buy"?"#fff":"#3a5a8a")+'" onclick="setExMode(\'buy\')">^ OPAY AL</button>'+
  '<button style="flex:1;padding:7px 0;border:none;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer;background:'+(state.exMode==="sell"?"linear-gradient(135deg,#f04060,#aa1133)":"transparent")+';color:'+(state.exMode==="sell"?"#fff":"#3a5a8a")+'" onclick="setExMode(\'sell\')">v OPAY SAT</button>'+
  '</div>'+
  '<div style="margin-bottom:10px"><div style="font-size:11px;color:#3a5a8a;margin-bottom:3px">'+(state.exMode==="buy"?"Almak istediginiz OPAY":"Satmak istediginiz OPAY")+'</div>'+
  '<input class="inp" id="exAmt" type="number" min="0" placeholder="0.00" oninput="calcEx()"/></div>'+
  '<div id="exPreview"></div>'+
  '<button class="'+(state.exMode==="buy"?"btn-p":"btn-s")+'" style="width:100%" '+(state.busy?"disabled":"")+' onclick="doExchange()">'+(state.busy?"Isleniyor...":(state.exMode==="buy"?"OK OPAY SATIN AL":"[Spread] OPAY SAT"))+'</button>'+
  '<div id="exMsg"></div>'+
  '</div></div>';
}

// -- HISTORY --
function renderHistory() {
  var html = '<div class="card"><div style="font-size:10px;font-weight:700;color:#3a5a8a;text-transform:uppercase;margin-bottom:10px">Alim Satim Gecmisi</div>';
  if (!state.txsLoaded) {
    html += '<div class="spin">Yukleniyor...</div>';
  } else if (state.txs.length === 0) {
    html += '<div style="text-align:center;color:#3a5a8a;padding:24px 0">Henuz islem yok.</div>';
  } else {
    html += '<div style="overflow-x:auto"><table><thead><tr><th>Islem</th><th>Tarih</th><th>OPAY</th><th>USDT</th><th>Fiyat</th></tr></thead><tbody>';
    for (var i=0; i<state.txs.length; i++) {
      var tx = state.txs[i];
      html += '<tr>'+
        '<td><span style="display:inline-block;padding:2px 6px;border-radius:20px;font-size:10px;font-weight:600;background:'+(tx.type==="buy"?"#00C89615":"#f0406015")+';color:'+(tx.type==="buy"?"#00C896":"#f04060")+'">'+(tx.type==="buy"?"^ ALIM":"v SATIM")+'</span></td>'+
        '<td style="color:#3a5a8a;font-size:11px">'+h(tx.date)+'</td>'+
        '<td>'+parseFloat(tx.opay).toFixed(2)+'</td>'+
        '<td>'+parseFloat(tx.usdt).toFixed(4)+'</td>'+
        '<td style="color:'+(tx.type==="buy"?"#00C896":"#ff9f4a")+'">$'+parseFloat(tx.price).toFixed(4)+'</td>'+
        '</tr>';
    }
    html += '</tbody></table></div>';
  }
  html += '</div>';
  return html;
}

// -- WALLET --
function renderWallet(cur) {
  var wTabs = [
    {id:"deposit",label:"Para Yatir"},
    {id:"withdraw",label:"Para Cek"},
    {id:"history",label:"Gecmis"}
  ];
  var html = '<div style="max-width:480px;margin:0 auto">'+
  '<div style="display:flex;gap:3px;margin-bottom:12px;background:#0b1525;border-radius:9px;padding:3px">'+
  wTabs.map(function(tp) {
    return '<button style="flex:1;padding:6px 0;border:none;border-radius:6px;font-weight:600;font-size:11px;cursor:pointer;background:'+(state.wTab===tp.id?"linear-gradient(135deg,#00C896,#0088cc)":"transparent")+';color:'+(state.wTab===tp.id?"#fff":"#3a5a8a")+'" onclick="setWTab(\''+tp.id+'\')">'+h(tp.label)+'</button>';
  }).join("")+'</div>';

  if (state.wTab === "deposit") {
    html += '<div class="card"><div style="font-size:10px;font-weight:700;color:#3a5a8a;text-transform:uppercase;margin-bottom:10px">USDT Yatir</div>'+

// ACTIONS

function setPage(p) {
  state.page = p;
  render();
  if (p === "history" && !state.txsLoaded) {
    api("/api/transactions").then(function(t) { state.txs = t; state.txsLoaded = true; render(); }).catch(function(){});
  }
  if (p === "wallet" && state.wTab === "history" && !state.wtxsLoaded) {
    loadWtxs();
  }
  if (p === "admin") {
    if (state.adminTab === "users" && !state.adminUsersLoaded) loadAdminUsers();
    if (state.adminTab === "price" && !state.adminPricesLoaded) loadAdminPrices();
    if (state.adminTab === "wallets" && !state.adminWtxsLoaded) loadAdminWtxs();
  }
}

function toggleAuth() { state.authMode = state.authMode==="login"?"register":"login"; state.errAuth=""; render(); }
function setExMode(m) { state.exMode = m; render(); }
function setWTab(t) {
  state.wTab = t;
  render();
  if (t === "history" && !state.wtxsLoaded) loadWtxs();
}
function setAdminTab(t) {
  state.adminTab = t;
  render();
  if (t === "users" && !state.adminUsersLoaded) loadAdminUsers();
  if (t === "price" && !state.adminPricesLoaded) loadAdminPrices();
  if (t === "wallets" && !state.adminWtxsLoaded) loadAdminWtxs();
}

function showMsg(id, msg, ok) {
  var el = document.getElementById(id);
  if (el) el.innerHTML = '<div class="'+(ok?"msg-ok":"msg-er")+'">'+h(msg)+'</div>';
}

function loadWtxs() {
  api("/api/wallet/history").then(function(w) { state.wtxs = w; state.wtxsLoaded = true; render(); }).catch(function(){});
}
function loadAdminUsers() {
  api("/api/admin/users").then(function(u) { state.adminUsers = u; state.adminUsersLoaded = true; render(); }).catch(function(){});
}
function loadAdminPrices() {
  api("/api/admin/prices").then(function(p) { state.adminPrices = p; state.adminPricesLoaded = true; render(); }).catch(function(){});
}
function loadAdminWtxs() {
  api("/api/admin/wallet-requests").then(function(w) { state.adminWtxs = w; state.adminWtxsLoaded = true; render(); }).catch(function(){});
}

// -- AUTH --
function doAuth() {
  state.errAuth = "";
  var email = (document.getElementById("aEmail")||{}).value || "";
  var pw = (document.getElementById("aPw")||{}).value || "";
  email = email.trim();

  if (state.authMode === "login") {
    if (!email || !pw) { showMsg("authMsg","Tum alanlari doldurun.",false); return; }
    state.busy = true; render();
    api("/api/auth/login", "POST", { login: email, password: pw }).then(function(r) {
      state.token = r.token;
      localStorage.setItem("opay_token", r.token);
      return refreshMe();
    }).then(function() {
      state.busy = false;
      state.page = "dashboard";
      render();
      loadDashboardData();
    }).catch(function(e) {
      state.busy = false;
      render();
      showMsg("authMsg", e.message, false);
    });
  } else {
    var name = (document.getElementById("aName")||{}).value.trim() || "";
    var user = (document.getElementById("aUser")||{}).value.trim() || "";
    var cpw = (document.getElementById("aCPw")||{}).value || "";
    if (!name||!user||!email||!pw||!cpw) { showMsg("authMsg","Tum alanlari doldurun.",false); return; }
    if (pw !== cpw) { showMsg("authMsg","Sifreler eslesmiyor.",false); return; }
    state.busy = true; render();
    api("/api/auth/register", "POST", { username: user, email: email, password: pw, fullName: name }).then(function() {
      state.busy = false;
      state.authMode = "login";
      render();
      showMsg("authMsg","OK Hesap olusturuldu, simdi giris yapabilirsiniz.",true);
    }).catch(function(e) {
      state.busy = false;
      render();
      showMsg("authMsg", e.message, false);
    });
  }
}

function doLogout() {
  api("/api/auth/logout", "POST").catch(function(){}).then(function() {
    localStorage.removeItem("opay_token");
    state = {
      booting:false, cur:null, csrfToken:null, token:null, page:"dashboard", authMode:"login", adminTab:"price",
      wTab:"deposit", exMode:"buy", priceInfo:null, priceHistory:[], cards:[],
      txs:[], wtxs:[], adminUsers:[], adminPrices:[], adminWtxs:[], busy:false, errAuth:""
    };
    render();
  });
}

// -- EXCHANGE --
function calcEx() {
  var el = document.getElementById("exAmt");
  var preview = document.getElementById("exPreview");
  if (!el || !preview || !state.priceInfo) return;
  var amt = parseFloat(el.value);
  var buyP = state.priceInfo.buyPrice;
  var sellP = state.priceInfo.sellPrice;
  if (!amt || amt <= 0) { preview.innerHTML = ""; return; }
  if (state.exMode === "buy") {
    preview.innerHTML = '<div style="background:#060d1a;border-radius:8px;padding:10px;margin-bottom:11px;font-size:12px">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="color:#3a5a8a">Alacaginiz:</span><span style="color:#00C896;font-weight:700">'+amt.toFixed(2)+' OPAY</span></div>'+
      '<div style="display:flex;justify-content:space-between"><span style="color:#3a5a8a">Odenecek:</span><span style="font-weight:700">'+(amt*buyP).toFixed(4)+' USDT</span></div></div>';
  } else {
    var get = amt * sellP;
    preview.innerHTML = '<div style="background:#060d1a;border-radius:8px;padding:10px;margin-bottom:11px;font-size:12px">'+
      '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="color:#3a5a8a">Satacaginiz:</span><span style="color:#ff9f4a;font-weight:700">'+amt.toFixed(2)+' OPAY</span></div>'+
      '<div style="display:flex;justify-content:space-between"><span style="color:#3a5a8a">Alacaginiz:</span><span style="font-weight:700">'+get.toFixed(4)+' USDT</span></div>'+
      (get<10?'<div class="msg-er" style="padding:3px 7px;margin-top:2px">Min 10 USDT</div>':"")+
      '</div>';
  }
}

function doExchange() {
  var el = document.getElementById("exAmt");
  if (!el) return;
  var amt = parseFloat(el.value);
  if (!amt || amt <= 0) { showMsg("exMsg","Gecerli miktar girin.",false); return; }
  state.busy = true; render();
  api("/api/exchange", "POST", { type: state.exMode, amount: amt }).then(function(r) {
    return refreshMe().then(function() { return r; });
  }).then(function(r) {
    state.busy = false;
    state.txsLoaded = false;
    render();
    showMsg("exMsg", "OK Islem tamamlandi: "+r.opayAmount.toFixed(2)+" OPAY / "+r.usdtAmount.toFixed(4)+" USDT", true);
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("exMsg", e.message, false);
  });
}

// -- ADMIN: CRYPTOMUS --
function saveCM() {
  var k = (document.getElementById("cmKeyInp")||{}).value || "";
  var s = (document.getElementById("cmSecInp")||{}).value || "";
  if (!k || !s) { showMsg("cmMsg","Her iki alani da doldurun.",false); return; }
  state.busy = true; render();
  api("/api/admin/cryptomus", "POST", { merchant: k, secret: s }).then(function() {
    state.busy = false;
    render();
    showMsg("cmMsg","OK Kaydedildi!",true);
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("cmMsg", e.message, false);
  });
}

// -- WALLET: DEPOSIT / WITHDRAW --
function doDeposit() {
  var amtEl = document.getElementById("depAmt");
  var coinEl = document.getElementById("depCoin");
  var netEl = document.getElementById("depNet");
  if (!amtEl) return;
  var amt = parseFloat(amtEl.value);
  if (!amt || amt <= 0) { showMsg("depMsg","Gecerli miktar girin.",false); return; }
  var coin = coinEl ? coinEl.value : "USDT";
  var net = netEl ? netEl.value : "TRON";
  state.busy = true; render();
  api("/api/wallet/deposit", "POST", { amount: amt, coin: coin, network: net }).then(function(r) {
    state.busy = false;
    render();
    if (r.url) {
      showMsg("depMsg","OK Odeme sayfasi aciliyor...",true);
      window.open(r.url, "_blank");
    } else {
      showMsg("depMsg","OK Talep olusturuldu.",true);
    }
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("depMsg", e.message, false);
  });
}

function doWithdraw() {
  var amtEl = document.getElementById("wdAmt");
  var addrEl = document.getElementById("wdAddr");
  var netEl = document.getElementById("wdNet");
  if (!amtEl) return;
  var amt = parseFloat(amtEl.value);
  var addr = addrEl ? addrEl.value.trim() : "";
  var net = netEl ? netEl.value : "TRON";
  if (!amt || amt < 10) { showMsg("wdMsg","Min cekim 10 USDT.",false); return; }
  if (!addr || addr.length < 10) { showMsg("wdMsg","Gecerli adres girin.",false); return; }
  state.busy = true; render();
  api("/api/wallet/withdraw", "POST", { amount: amt, network: net, address: addr }).then(function() {
    return refreshMe();
  }).then(function() {
    state.busy = false;
    state.wtxsLoaded = false;
    render();
    showMsg("wdMsg","OK Talebiniz alindi.",true);
  }).catch(function(e) {
    state.busy = false;
    render();
    showMsg("wdMsg", e.message, false);
  });
}

// -- ADMIN: WALLET REQUESTS --
function approveTx(id) {
  api("/api/admin/wallet-requests/" + id + "/approve", "POST").then(function() {
    loadAdminWtxs();
  }).catch(function(e) { alert(e.message); });
}
function rejectTx(id) {
  api("/api/admin/wallet-requests/" + id + "/reject", "POST").then(function() {
    loadAdminWtxs();
  }).catch(function(e) { alert(e.message); });
}

// ========================================
// START
// ========================================
boot();
</script>
