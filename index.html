function T(lang,key,vars){
  const d=lang==="tr"?TR:EN;
  let s=d[key]??EN[key]??key;
  if(vars) Object.keys(vars).forEach(k=>{s=s.replace("{"+k+"}",vars[k]);});
  return s;
}

// ── Chart ──
function Chart({history}){
  if(!history||history.length<2) return null;
  const W=540,H=160,PL=44,PT=8,PR=8,PB=26;
  const pw=W-PL-PR,ph=H-PT-PB;
  const ps=history.map(h=>parseFloat(h.buy));
  const mn=Math.min(...ps)*0.97,mx=Math.max(...ps)*1.02;
  const xi=i=>PL+i*(pw/(history.length-1));
  const yi=v=>PT+ph-((v-mn)/(mx-mn))*ph;
  const pts=history.map((_,i)=>[xi(i),yi(ps[i])]);
  const line=pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const area=line+" L"+pts[pts.length-1][0]+","+(PT+ph)+" L"+pts[0][0]+","+(PT+ph)+" Z";
  return(
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#00C896" stopOpacity="0.3"/><stop offset="100%" stopColor="#00C896" stopOpacity="0.02"/></linearGradient></defs>
      {[mn,(mn+mx)/2,mx].map((t,i)=><g key={i}><line x1={PL} y1={yi(t)} x2={PL+pw} y2={yi(t)} stroke="#ffffff08" strokeWidth="1"/><text x={PL-3} y={yi(t)+4} textAnchor="end" fill="#445" fontSize="10">${t.toFixed(2)}</text></g>)}
      {[0,Math.floor(history.length/2),history.length-1].map(i=><text key={i} x={xi(i)} y={H-2} textAnchor="middle" fill="#445" fontSize="9">{history[i].date.slice(0,7)}</text>)}
      <path d={area} fill="url(#g)"/><path d={line} fill="none" stroke="#00C896" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="4" fill="#00C896" stroke="#0a1628" strokeWidth="2"/>
    </svg>
  );
}

}

function App(){
  const [lang,setLang]=useState(()=>localStorage.getItem("ol")||"en");
  const t=(k,v)=>T(lang,k,v);

  // State — loaded from localStorage
  const [users,setUsers]=useState(()=>LS.get("opay_users",DEF_USERS));
  const [prices,setPrices]=useState(()=>LS.get("opay_prices",DEF_PRICES));
  const [spread,setSpread]=useState(()=>LS.get("opay_spread",2));
  const [cards,setCards]=useState(()=>LS.get("opay_cards",DEF_CARDS));
  const [txs,setTxs]=useState(()=>LS.get("opay_txs",[]));
  const [wtxs,setWtxs]=useState(()=>LS.get("opay_wtxs",[]));
  const [cmKey,setCmKey]=useState(()=>LS.get("opay_cmk",""));
  const [cmSec,setCmSec]=useState(()=>LS.get("opay_cms",""));
  const [session,setSession]=useState(()=>LS.get("opay_session",null));

  // Save to localStorage on change
  useEffect(()=>LS.set("opay_users",users),[users]);
  useEffect(()=>LS.set("opay_prices",prices),[prices]);
  useEffect(()=>LS.set("opay_spread",spread),[spread]);
  useEffect(()=>LS.set("opay_cards",cards),[cards]);

  useEffect(()=>LS.set("opay_session",session),[session]);

  const cur=session?users[session]:null;
  const last=prices[prices.length-1]||{buy:2.85};
  const buyP=parseFloat(last.buy)||2.85;
  const sellP=parseFloat((buyP*(1-spread/100)).toFixed(4));
  const prev=prices.length>1?parseFloat(prices[prices.length-2].buy):buyP;
  const chg=((buyP-prev)/prev*100).toFixed(2);
  const isUp=parseFloat(chg)>=0;

  // UI state
  const [page,setPage]=useState("dashboard");
  const [authMode,setAuthMode]=useState("login");
  const [aUser,setAUser]=useState("");const [aEmail,setAEmail]=useState("");const [aName,setAName]=useState("");
  const [aPw,setAPw]=useState("");const [aCPw,setACPw]=useState("");
  const [aErr,setAErr]=useState("");const [aOk,setAOk]=useState("");
  const [exMode,setExMode]=useState("buy");const [exAmt,setExAmt]=useState("");const [exMsg,setExMsg]=useState("");
  const [newP,setNewP]=useState("");const [prMsg,setPrMsg]=useState("");
  const [editCards,setEditCards]=useState(null);const [cntMsg,setCntMsg]=useState("");
  const [uSearch,setUSearch]=useState("");const [adjUser,setAdjUser]=useState(null);
  const [adjType,setAdjType]=useState("");const [adjAmt,setAdjAmt]=useState("");const [adjMsg,setAdjMsg]=useState("");
  const [adminTab,setAdminTab]=useState("price");
  const [wTab,setWTab]=useState("deposit");
  const [depAmt,setDepAmt]=useState("");const [depCoin,setDepCoin]=useState("USDT");const [depNet,setDepNet]=useState("TRON");const [depMsg,setDepMsg]=useState("");
  const [wdAmt,setWdAmt]=useState("");const [wdAddr,setWdAddr]=useState("");const [wdNet,setWdNet]=useState("TRON");const [wdMsg,setWdMsg]=useState("");
  const [cmSaved,setCmSaved]=useState(false);
  const [spreadIn,setSpreadIn]=useState(String(spread));const [spreadMsg,setSpreadMsg]=useState("");
  const [editP,setEditP]=useState(null);const [phMsg,setPhMsg]=useState("");

  // AUTH
  function doLogin(){
    setAErr("");setAOk("");
    if(!aEmail||!aPw){setAErr(t("errFields"));return;}
    const u=Object.entries(users).find(([k,v])=>(k===aEmail||v.email===aEmail||k===aEmail)&&v.pw===aPw);
    if(!u){setAErr(t("errLogin"));return;}
    setSession(u[0]);setPage("dashboard");setAUser("");setAPw("");
  }
  function doRegister(){
    setAErr("");setAOk("");
    if(!aName||!aUser||!aEmail||!aPw||!aCPw){setAErr(t("errFields"));return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(aEmail)){setAErr(t("errEmail"));return;}
    if(aPw!==aCPw){setAErr(t("errPwMatch"));return;}
    if(users[aUser]||Object.values(users).find(v=>v.email===aEmail)){setAErr(t("errExists"));return;}
    setUsers(p=>({...p,[aUser]:{pw:aPw,name:aName,email:aEmail,usdt:0,opay:0,isAdmin:false}}));
    setAOk(t("okRegister"));setAuthMode("login");
    setAUser("");setAPw("");setACPw("");setAName("");setAEmail("");
  }
  function doLogout(){setSession(null);setPage("dashboard");}

  // EXCHANGE
  function doExchange(){
    const amt=parseFloat(exAmt);
    if(!amt||amt<=0){setExMsg(t("errAmt"));return;}
    const u={...users[session]};
    if(exMode==="buy"){
      const cost=parseFloat((amt*buyP).toFixed(6));
      if(cost>u.usdt){setExMsg(t("errUsdt"));return;}
      u.usdt=parseFloat((u.usdt-cost).toFixed(6));
      u.opay=parseFloat((u.opay+amt).toFixed(6));
      const tx={id:Date.now(),user:session,type:"buy",opay:amt,usdt:cost,price:buyP,date:new Date().toISOString().slice(0,16).replace("T"," ")};
      setTxs(p=>[tx,...p]);
      setExMsg(t("msgBought",{amt:amt.toFixed(2),usdt:cost.toFixed(4)}));
    }else{
      if(amt>u.opay){setExMsg(t("errOpay"));return;}
      const get=parseFloat((amt*sellP).toFixed(6));
      if(get<10){setExMsg(t("errMinSell"));return;}
      u.opay=parseFloat((u.opay-amt).toFixed(6));
      u.usdt=parseFloat((u.usdt+get).toFixed(6));
      const tx={id:Date.now(),user:session,type:"sell",opay:amt,usdt:get,price:sellP,date:new Date().toISOString().slice(0,16).replace("T"," ")};
      setTxs(p=>[tx,...p]);
      setExMsg(t("msgSold",{amt:amt.toFixed(2),usdt:get.toFixed(4)}));
    }
    setUsers(p=>({...p,[session]:u}));setExAmt("");
  }

  // ADMIN
  function doUpdatePrice(){
    const p=parseFloat(newP);
    if(!p||p<=buyP){setPrMsg(t("errPrice"));return;}
    setPrices(pr=>[...pr,{date:new Date().toISOString().slice(0,10),buy:p}]);
    setPrMsg(t("msgPriceOk"));setNewP("");
  }
  function doSaveSpread(){
    const s=parseFloat(spreadIn);
    if(isNaN(s)||s<0||s>50){setSpreadMsg("⚠️ 0-50 arası");return;}
    setSpread(s);setSpreadMsg(t("spreadSaved"));
  }
  function saveEditedPrice(){
    if(!editP) return;
    const p=parseFloat(editP.buy);
    if(!p){setPhMsg("⚠️ Geçersiz");return;}
    const upd=[...prices];upd[editP.idx]={date:editP.date,buy:p};
    setPrices(upd);setEditP(null);setPhMsg("✅ Güncellendi.");
  }
  function delPrice(idx){setPrices(p=>p.filter((_,i)=>i!==idx));setPhMsg("✅ Silindi.");}
  function saveCards(){LS.set("opay_cards",editCards);setCards(editCards);setEditCards(null);setCntMsg(t("msgSaved"));}
  function openAdj(u,type){setAdjUser(u);setAdjType(type);setAdjAmt("");setAdjMsg("");}
  function doAdj(){
    const amt=parseFloat(adjAmt);
    if(!amt||amt<0){setAdjMsg("Geçerli miktar.");return;}
    setUsers(p=>{
      const u={...p[adjUser]};
      if(adjType==="addO") u.opay=parseFloat(((u.opay||0)+amt).toFixed(6));
      else if(adjType==="remO") u.opay=Math.max(0,parseFloat(((u.opay||0)-amt).toFixed(6)));
      else if(adjType==="addU") u.usdt=parseFloat(((u.usdt||0)+amt).toFixed(6));
      else if(adjType==="remU") u.usdt=Math.max(0,parseFloat(((u.usdt||0)-amt).toFixed(6)));
      return {...p,[adjUser]:u};
    });
    setAdjMsg(t("msgBalOk"));setAdjAmt("");
  }
  function saveCM(){LS.set("opay_cmk",cmKey);LS.set("opay_cms",cmSec);setCmSaved(true);}

  // WALLET
  async function doDeposit(){
    setDepMsg("");
    const amt=parseFloat(depAmt);
    if(!amt||amt<=0){setDepMsg(t("errAmt2"));return;}
    if(!cmKey||!cmSec){setDepMsg("⚠️ Cryptomus ayarlı değil. Admin panelinden ayarlayın.");return;}
    const oid="DEP-"+Date.now()+"-"+session;
    const body={amount:String(amt),currency:"USD",order_id:oid,url_return:window.location.href,network:depNet,to_currency:depCoin,lifetime:3600};
    try{
      const enc=new TextEncoder();
      const str=btoa(JSON.stringify(body));
      const key=await crypto.subtle.importKey("raw",enc.encode(cmSec),{name:"HMAC",hash:"MD5"},false,["sign"]);
      const sig=await crypto.subtle.sign("HMAC",key,enc.encode(str));
      const sign=Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,"0")).join("");
      const res=await fetch("https://api.cryptomus.com/v1/payment",{method:"POST",headers:{"merchant":cmKey,"sign":sign,"Content-Type":"application/json"},body:JSON.stringify(body)});
      const data=await res.json();
      if(data?.result?.url){
        const tx={id:oid,user:session,type:"deposit",amt,coin:depCoin,net:depNet,status:"pending",date:new Date().toISOString().slice(0,16).replace("T"," ")};
        setWtxs(p=>[tx,...p]);
        setDepMsg(t("depPending"));setTimeout(()=>window.open(data.result.url,"_blank"),800);
      }else{setDepMsg("⚠️ "+(data?.errors?.join(", ")||data?.message||"Hata"));}
    }catch(e){setDepMsg("⚠️ "+e.message);}
  }
  function doWithdraw(){
    setWdMsg("");
    const amt=parseFloat(wdAmt);
    if(!amt||amt<10){setWdMsg(t("errWdMin"));return;}
    if(!wdAddr||wdAddr.length<10){setWdMsg(t("errWdAddr"));return;}
    if(amt>(users[session].usdt||0)){setWdMsg(t("errWdBal"));return;}
    setUsers(p=>{const u={...p[session]};u.usdt=parseFloat((u.usdt-amt).toFixed(6));return {...p,[session]:u};});
    const tx={id:"WD-"+Date.now(),user:session,type:"withdraw",amt,addr:wdAddr,net:wdNet,status:"pending",date:new Date().toISOString().slice(0,16).replace("T"," ")};
    setWtxs(p=>[tx,...p]);setWdMsg(t("wdPending"));setWdAmt("");setWdAddr("");
  }

      return {...tx,status:"done"};
    }));
  }
  function rejectTx(id){
    setWtxs(p=>p.map(tx=>{
      if(tx.id!==id) return tx;
      if(tx.type==="withdraw") setUsers(u=>{const usr={...u[tx.user]};usr.usdt=parseFloat(((usr.usdt||0)+tx.amt).toFixed(6));return {...u,[tx.user]:usr};});

        {page==="admin"&&isAdmin&&(<>
          <div style={{display:"flex",gap:3,marginBottom:12,flexWrap:"wrap"}}>{["price","spread","content","users","cryptomus","wallets"].map(tp=>(<button key={tp} style={S.at(adminTab===tp)} onClick={()=>setAdminTab(tp)}>{tp==="price"?"📈":tp==="spread"?"💱":tp==="content"?"✏️":tp==="users"?"👥":tp==="cryptomus"?"🔑":"💳"} {tp}</button>))}</div>

          {adminTab==="price"&&(<><div style={S.card}><div style={S.ct}>{t("adminPrice")}</div><div style={S.row}><div style={{flex:1}}><div style={{fontSize:12,marginBottom:6,color:C.mu}}>{t("curBuy")} <span style={{color:C.G,fontWeight:700}}>${buyP.toFixed(4)}</span></div><div style={{fontSize:11,color:C.mu,marginBottom:4}}>{t("newBuyLbl")}</div><input style={{...S.inp,marginBottom:8}} type="number" step="0.0001" placeholder={(buyP*1.005).toFixed(4)} value={newP} onChange={e=>setNewP(e.target.value)}/>{newP&&parseFloat(newP)>0&&(<div style={{background:C.bg,borderRadius:7,padding:9,fontSize:12,marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:C.mu}}>Buy:</span><span style={{color:C.G,fontWeight:700}}>${parseFloat(newP).toFixed(4)}</span></div><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.mu}}>Sell:</span><span style={{color:C.O,fontWeight:700}}>${(parseFloat(newP)*(1-spread/100)).toFixed(4)}</span></div></div>)}<button style={{...S.btn("p"),width:"100%"}} onClick={doUpdatePrice}>{t("updateBtn")}</button>{prMsg&&<div style={S.msg(prMsg.startsWith("✅"))}>{prMsg}</div>}</div><div style={{flex:1}}><div style={S.note}>{"📈 Fiyat Rehberi\n\nYeni alış fiyatı girin.\nSatış = alış × (1 - spread%)\nTüm kullanıcılar anlık görür.\n\nÖneri: Günlük +0.3–1.5%"}</div></div></div></div>
          <div style={S.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={S.ct}>{t("phTitle")}</div><span style={{fontSize:10,color:C.mu}}>Satıra tıkla → düzenle</span></div><Chart history={prices}/>{phMsg&&<div style={{...S.msg(phMsg.startsWith("✅")),marginTop:8}}>{phMsg}</div>}<div style={{overflowX:"auto",marginTop:11}}><table style={S.tbl}><thead><tr>{["Date","Buy","Sell",t("dailyChg"),""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>{[...prices].reverse().map((p,ri)=>{const ri2=prices.length-1-ri;const pp=prices[ri2-1];const cv=pp?((parseFloat(p.buy)-parseFloat(pp.buy))/parseFloat(pp.buy)*100).toFixed(2):"—";const ie=editP?.idx===ri2;return(<tr key={ri} style={{cursor:"pointer"}} onClick={()=>!ie&&setEditP({idx:ri2,date:p.date,buy:String(p.buy)})}><td style={S.td}>{ie?<input style={{...S.inp,padding:"2px 6px",fontSize:11}} value={editP.date} onChange={e=>setEditP(v=>({...v,date:e.target.value}))}/>:p.date}</td><td style={{...S.td,color:C.G}}>{ie?<input style={{...S.inp,padding:"2px 6px",fontSize:11}} type="number" step="0.0001" value={editP.buy} onChange={e=>setEditP(v=>({...v,buy:e.target.value}))}/>:`$${parseFloat(p.buy).toFixed(4)}`}</td><td style={{...S.td,color:C.O}}>${(parseFloat(p.buy)*(1-spread/100)).toFixed(4)}</td><td style={S.td}>{cv!=="—"?<span style={{color:parseFloat(cv)>=0?C.G:C.R}}>{parseFloat(cv)>=0?"+":""}{cv}%</span>:"—"}</td><td style={S.td}>{ie?(<div style={{display:"flex",gap:3}}><button style={{...S.btn("p"),padding:"2px 7px",fontSize:10}} onClick={e=>{e.stopPropagation();saveEditedPrice();}}>✅</button><button style={{...S.btn("g"),padding:"2px 7px",fontSize:10}} onClick={e=>{e.stopPropagation();setEditP(null);}}>✕</button><button style={{...S.btn("s"),padding:"2px 7px",fontSize:10}} onClick={e=>{e.stopPropagation();delPrice(ri2);}}>🗑</button></div>):<span style={{fontSize:10,color:C.mu}}>✏️</span>}</td></tr>);})}</tbody></table></div></div></>)}

          {adminTab==="spread"&&(<div style={S.card}><div style={S.ct}>💱 {t("spreadLbl")}</div><div style={{fontSize:12,color:C.mu,marginBottom:12}}>Mevcut: <span style={{color:C.G,fontWeight:700}}>{spread}%</span> — Alış: <span style={{color:C.G}}>${buyP.toFixed(4)}</span> / Satış: <span style={{color:C.O}}>${sellP.toFixed(4)}</span></div><div style={{marginBottom:10}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>Yeni % (0–50)</div><input style={{...S.inp,maxWidth:160}} type="number" step="0.1" min="0" max="50" placeholder="2" value={spreadIn} onChange={e=>{setSpreadIn(e.target.value);setSpreadMsg("");}}/></div><button style={S.btn("p")} onClick={doSaveSpread}>{t("spreadSave")}</button>{spreadMsg&&<div style={S.msg(spreadMsg.startsWith("✅"))}>{spreadMsg}</div>}</div>)}

          {adminTab==="content"&&(<div style={S.card}><div style={S.ct}>{t("cntTitle")}</div>{!editCards?(<><div style={{...S.row,gap:8,marginBottom:11}}>{cards.map((c,i)=>(<div key={i} style={{flex:1,minWidth:120,background:C.bg,borderRadius:9,padding:11}}><div style={{fontSize:19,marginBottom:4}}>{c.icon}</div><div style={{fontWeight:600,fontSize:12,marginBottom:3}}>{c.title}</div><div style={{fontSize:11,color:C.mu}}>{c.desc}</div></div>))}</div><button style={S.btn("p")} onClick={()=>setEditCards(cards.map(c=>({...c})))}>✏️ Edit</button>{cntMsg&&<div style={S.msg(true)}>{cntMsg}</div>}</>):(<>{editCards.map((c,i)=>(<div key={i} style={{background:C.bg,borderRadius:9,padding:11,marginBottom:8}}><div style={{...S.row,gap:6,alignItems:"center",marginBottom:6}}><input style={{...S.inp,width:50,flexShrink:0}} value={c.icon} onChange={e=>{const n=[...editCards];n[i]={...n[i],icon:e.target.value};setEditCards(n);}}/><input style={{...S.inp,flex:1}} value={c.title} onChange={e=>{const n=[...editCards];n[i]={...n[i],title:e.target.value};setEditCards(n);}}/></div><textarea style={{...S.inp,resize:"vertical",minHeight:50}} value={c.desc} onChange={e=>{const n=[...editCards];n[i]={...n[i],desc:e.target.value};setEditCards(n);}}/></div>))}<div style={{display:"flex",gap:6}}><button style={S.btn("p")} onClick={saveCards}>{t("saveBtn")}</button><button style={S.btn("g")} onClick={()=>setEditCards(null)}>{t("cancelBtn")}</button></div></>)}</div>)}

          {adminTab==="users"&&(<div style={S.card}><div style={S.ct}>{t("userTitle")}</div><input style={{...S.inp,marginBottom:11}} placeholder={t("searchU")} value={uSearch} onChange={e=>setUSearch(e.target.value)}/>{fu.length===0?<div style={{textAlign:"center",color:C.mu,padding:"18px 0"}}>{t("noUsers")}</div>:(<div style={{overflowX:"auto"}}><table style={S.tbl}><thead><tr>{["User","Email","OPAY","USDT","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>{fu.map(([k,u])=>(<tr key={k}><td style={S.td}><div style={{fontWeight:600,fontSize:12}}>{u.name}</div><div style={{fontSize:10,color:C.mu}}>@{k}{u.isAdmin?" 🔑":""}</div></td><td style={{...S.td,color:C.mu,fontSize:10}}>{u.email}</td><td style={{...S.td,color:C.G,fontSize:12}}>{(u.opay||0).toFixed(2)}</td><td style={{...S.td,fontSize:12}}>{(u.usdt||0).toFixed(2)}</td><td style={S.td}><div style={{display:"flex",gap:2,flexWrap:"wrap"}}>{[["addO",t("addO"),"p"],["remO",t("remO"),"s"],["addU",t("addU"),"p"],["remU",t("remU"),"s"]].map(([tp,lb,v])=>(<button key={tp} style={{...S.btn(v),padding:"2px 6px",fontSize:10}} onClick={()=>openAdj(k,tp)}>{lb}</button>))}</div></td></tr>))}</tbody></table></div>)}{adjUser&&(<div style={{position:"fixed",inset:0,background:"#000b",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}><div style={{...S.card,width:280,margin:0}}><div style={{fontWeight:600,marginBottom:10,fontSize:12}}>{t("adjFor")} @{adjUser}</div><input style={{...S.inp,marginBottom:8}} type="number" min="0" placeholder="0.00" value={adjAmt} onChange={e=>setAdjAmt(e.target.value)}/>{adjMsg&&<div style={S.msg(adjMsg.startsWith("✅"))}>{adjMsg}</div>}<div style={{display:"flex",gap:6,marginTop:10}}><button style={{...S.btn("p"),flex:1}} onClick={doAdj}>{t("applyBtn")}</button><button style={{...S.btn("g"),flex:1}} onClick={()=>{setAdjUser(null);setAdjMsg("");}}>{t("cancelBtn")}</button></div></div></div>)}</div>)}

          {adminTab==="cryptomus"&&(<div style={S.card}><div style={S.ct}>{t("cmSetup")}</div><div style={{...S.note,marginBottom:14,fontSize:11}}>{"1. cryptomus.com → Merchants → Create\n2. Merchant UUID → API Key\n3. Payment API Key → Secret\n4. Save"}</div><div style={{marginBottom:10}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>Merchant UUID</div><input style={S.inp} placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" value={cmKey} onChange={e=>{setCmKey(e.target.value);setCmSaved(false);}}/></div><div style={{marginBottom:12}}><div style={{fontSize:11,color:C.mu,marginBottom:3}}>Payment API Key</div><input style={S.inp} type="password" placeholder="••••••••" value={cmSec} onChange={e=>{setCmSec(e.target.value);setCmSaved(false);}}/></div><button style={{...S.btn("p"),width:"100%"}} onClick={saveCM}>💾 Kaydet</button>{cmSaved&&<div style={S.msg(true)}>{t("cmSavedMsg")}</div>}</div>)}

          {adminTab==="wallets"&&(<div style={S.card}><div style={S.ct}>💳 Tüm İstekler</div>{allWtxs.length===0?<div style={{textAlign:"center",color:C.mu,padding:"20px 0"}}>{t("noWalletTx")}</div>:(<div style={{overflowX:"auto"}}><table style={S.tbl}><thead><tr>{["User","Type","Date","USDT","Status","Action"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead><tbody>{allWtxs.map((tx,i)=>(<tr key={i}><td style={{...S.td,fontSize:10,color:C.mu}}>@{tx.user}</td><td style={S.td}><span style={{fontSize:10,fontWeight:600,color:tx.type==="deposit"?C.G:C.R}}>{tx.type==="deposit"?"⬇️":"⬆️"}</span></td><td style={{...S.td,color:C.mu,fontSize:10}}>{tx.date}</td><td style={{...S.td,color:C.G,fontWeight:600}}>{tx.amt?.toFixed(2)}</td><td style={S.td}><span style={{fontSize:10,fontWeight:600,color:tx.status==="done"?C.G:tx.status==="failed"?C.R:C.O}}>{tx.status==="done"?t("statusDone"):tx.status==="failed"?t("statusFailed"):t("statusPending")}</span></td><td style={S.td}>{tx.status==="pending"?(<div style={{display:"flex",gap:3}}><button style={{...S.btn("p"),padding:"2px 6px",fontSize:10}} onClick={()=>approveTx(tx.id)}>{t("approveBtn")}</button><button style={{...S.btn("s"),padding:"2px 6px",fontSize:10}} onClick={()=>rejectTx(tx.id)}>{t("rejectBtn")}</button></div>):<span style={{fontSize:10,color:C.mu}}>—</span>}</td></tr>))}</tbody></table></div>)}</div>)}
        </>)}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
