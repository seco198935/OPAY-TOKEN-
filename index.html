// ─── PRICE CHART ──────────────────────────────────────────────────────────────
function PriceChart({history}){
  if(!history||history.length<2) return null;
  const W=600,H=190,PL=52,PT=12,PR=16,PB=34;
  const pw=W-PL-PR,ph=H-PT-PB;
  const prices=history.map(h=>h.buy);
  const mn=Math.min(...prices)*0.97,mx=Math.max(...prices)*1.02;
  const xi=(i)=>PL+i*(pw/(history.length-1));
  const yi=(v)=>PT+ph-((v-mn)/(mx-mn))*ph;
  const pts=history.map((_,i)=>[xi(i),yi(history[i].buy)]);
  const line=pts.map((p,i)=>`${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const area=`${line} L${pts[pts.length-1][0]},${PT+ph} L${pts[0][0]},${PT+ph} Z`;
  const ticks=[mn,(mn+mx)/2,mx];
  const labs=[0,Math.floor(history.length/2),history.length-1];
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#00C896" stopOpacity="0.3"/>
          <stop offset="100%" stopColor="#00C896" stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      {ticks.map((t,i)=>(
        <g key={i}>
          <line x1={PL} y1={yi(t)} x2={PL+pw} y2={yi(t)} stroke="#ffffff0d" strokeWidth="1"/>
          <text x={PL-5} y={yi(t)+4} textAnchor="end" fill="#445" fontSize="10">${t.toFixed(3)}</text>
        </g>
      ))}
      {labs.map(i=>(
        <text key={i} x={xi(i)} y={H-4} textAnchor="middle" fill="#445" fontSize="9">{history[i].date.slice(0,7)}</text>
      ))}
      <path d={area} fill="url(#cg)"/>
      <path d={line} fill="none" stroke="#00C896" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="4" fill="#00C896" stroke="#0a1628" strokeWidth="2"/>
    </svg>
  );
}

  async function doRegister(){
    setAErr(""); setAOk("");
    if(!aName||!aUser||!aEmail||!aPw||!aCPw){setAErr(t("errFields"));return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(aEmail)){setAErr(t("errEmail"));return;}
    if(aPw!==aCPw){setAErr(t("errPwMatch"));return;}
    try{
      const cred=await auth.createUserWithEmailAndPassword(aEmail,aPw);
      const uid=cred.user.uid;
      // Check username unique
      const snap=await db.ref("usernames/"+aUser).get();
      if(snap.exists()){
        await auth.currentUser.delete();
        setAErr(t("errExists")); return;
      }
      const profileData={username:aUser,name:aName,email:aEmail,usdt:0,opay:0,isAdmin:false};
      await db.ref(`users/${uid}`).set(profileData);
      await db.ref(`usernames/${aUser}`).set(uid);
      setAOk(t("okRegister")); setAuthMode("login");
      setAUser(""); setAPw(""); setACPw(""); setAName(""); setAEmail("");
    }catch(e){setAErr(e.message);}

  async function doExchange(){
    const amt=parseFloat(exAmt);
    if(!amt||amt<=0){setExMsg(t("errAmt"));return;}
    const uid=fbUser.uid;
    const snap=await db.ref(`users/${uid}`).get();
    const u=snap.val();
    let updUsdt=u.usdt, updOpay=u.opay;
    const ts=Date.now();
    if(exMode==="buy"){
      const cost=parseFloat((amt*buyP).toFixed(6));
      if(cost>u.usdt){setExMsg(t("errUsdt"));return;}
      updUsdt=parseFloat((u.usdt-cost).toFixed(6));
      updOpay=parseFloat((u.opay+amt).toFixed(6));
      const tx={type:"buy",opay:amt,usdt:cost,price:buyP,date:new Date().toISOString().slice(0,16).replace("T"," "),ts};
      await db.ref(`transactions/${uid}/${ts}`).set(tx);
      setExMsg(t("msgBought",{amt:amt.toFixed(2),usdt:cost.toFixed(4)}));
    } else {
      if(amt>u.opay){setExMsg(t("errOpay"));return;}
      const get=parseFloat((amt*sellP).toFixed(6));
      if(get<10){setExMsg(t("errMinSell"));return;}
      updOpay=parseFloat((u.opay-amt).toFixed(6));
      updUsdt=parseFloat((u.usdt+get).toFixed(6));
      const tx={type:"sell",opay:amt,usdt:get,price:sellP,date:new Date().toISOString().slice(0,16).replace("T"," "),ts};
      await db.ref(`transactions/${uid}/${ts}`).set(tx);
      setExMsg(t("msgSold",{amt:amt.toFixed(2),usdt:get.toFixed(4)}));
    }
    await db.ref(`users/${uid}`).update({usdt:updUsdt,opay:updOpay});
    setExAmt("");
  }

  async function doDeposit(){
    setDepMsg("");
    const amt=parseFloat(depAmt);
    if(!amt||amt<=0){setDepMsg(t("errAmt2"));return;}
    if(!cmKey||!cmSec){setDepMsg("⚠️ Cryptomus not configured. Contact admin.");return;}
    const orderId=`DEP-${Date.now()}-${fbUser.uid}`;
    const body={amount:String(amt),currency:"USD",order_id:orderId,url_return:window.location.href,network:depNet,to_currency:depCoin,lifetime:3600};
    const sign=await cryptomusSign(body,cmSec);
    try{
      const res=await fetch("https://api.cryptomus.com/v1/payment",{
        method:"POST",
        headers:{"merchant":cmKey,"sign":sign,"Content-Type":"application/json"},
        body:JSON.stringify(body)
      });
      const data=await res.json();
      if(data?.result?.url){
        const ts=Date.now();
        await db.ref(`walletTxs/${fbUser.uid}/${ts}`).set({id:orderId,type:"deposit",amt,coin:depCoin,net:depNet,status:"pending",date:new Date().toISOString().slice(0,16).replace("T"," "),ts,uid:fbUser.uid});
        setDepMsg(t("depPending"));
        setTimeout(()=>window.open(data.result.url,"_blank"),800);
      } else {
        setDepMsg("⚠️ "+(data?.errors?.join(", ")||data?.message||"Cryptomus error."));
      }
    }catch(e){setDepMsg("⚠️ "+e.message);}
  }

  async function doWithdraw(){
    setWdMsg("");
    const amt=parseFloat(wdAmt);
    if(!amt||amt<10){setWdMsg(t("errWdMin"));return;}
    if(!wdAddr||wdAddr.length<10){setWdMsg(t("errWdAddr"));return;}
    const snap=await db.ref(`users/${fbUser.uid}`).get();

    const newUsdt=parseFloat((u.usdt-amt).toFixed(6));
    await db.ref(`users/${fbUser.uid}`).update({usdt:newUsdt});
    const ts=Date.now();
    await db.ref(`walletTxs/${fbUser.uid}/${ts}`).set({type:"withdraw",amt,addr:wdAddr,net:wdNet,status:"pending",date:new Date().toISOString().slice(0,16).replace("T"," "),ts,uid:fbUser.uid});

  // ADMIN: APPROVE/REJECT WALLET TX
  // ════════════════════════════════════════════════════════════════════════════
  async function approveWalletTx(tx){
    await db.ref(`walletTxs/${tx.uid}/${tx.ts}`).update({status:"done"});
    if(tx.type==="deposit"){
      const snap=await db.ref(`users/${tx.uid}`).get();
      const u=snap.val();
      await db.ref(`users/${tx.uid}`).update({usdt:parseFloat(((u.usdt||0)+tx.amt).toFixed(6))});
    }
  }
  async function rejectWalletTx(tx){
    await db.ref(`walletTxs/${tx.uid}/${tx.ts}`).update({status:"failed"});
    if(tx.type==="withdraw"){
      const snap=await db.ref(`users/${tx.uid}`).get();
      const u=snap.val();
      await db.ref(`users/${tx.uid}`).update({usdt:parseFloat(((u.usdt||0)+tx.amt).toFixed(6))});
    }
  }

  async function cryptomusSign(body,secret){
    const str=btoa(JSON.stringify(body));
    const enc=new TextEncoder();
    const key=await crypto.subtle.importKey("raw",enc.encode(secret),{name:"HMAC",hash:"MD5"},false,["sign"]);
    const sig=await crypto.subtle.sign("HMAC",key,enc.encode(str));
    return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }

                  <>
                    {editCards.map((c,i)=>(
                      <div key={i} style={{background:"#060d1a",borderRadius:10,padding:14,marginBottom:10}}>
                        <div style={{...s.row,gap:8,alignItems:"center",marginBottom:8}}>
                          <input style={{...s.inp,width:60,flexShrink:0}} value={c.icon} onChange={e=>{const n=[...editCards];n[i]={...n[i],icon:e.target.value};setEditCards(n);}}/>
                          <input style={{...s.inp,flex:1}} value={c.title} onChange={e=>{const n=[...editCards];n[i]={...n[i],title:e.target.value};setEditCards(n);}}/>
                        </div>
                        <textarea style={{...s.inp,resize:"vertical",minHeight:60}} value={c.desc} onChange={e=>{const n=[...editCards];n[i]={...n[i],desc:e.target.value};setEditCards(n);}}/>
                      </div>
                    ))}
                    <div style={{display:"flex",gap:8}}>
                      <button style={s.btn("primary")} onClick={saveCards}>{t("saveBtn")}</button>
                      <button style={s.btn("ghost")} onClick={()=>setEditCards(null)}>{t("cancelBtn")}</button>
                    </div>
                  </>
                )}
              </div>
            )}

            {/* ── USERS TAB ── */}
            {adminTab==="users"&&(
              <div style={s.card}>
                <div style={s.ct}>{t("userTitle")}</div>
                <input style={{...s.inp,marginBottom:14}} placeholder={t("searchU")} value={uSearch} onChange={e=>setUSearch(e.target.value)}/>
                {filteredUsers.length===0?(
                  <div style={{textAlign:"center",color:"#3a5a8a",padding:"24px 0"}}>{t("noUsers")}</div>
                ):(
                  <div style={{overflowX:"auto"}}>
                    <table style={s.tbl}>
                      <thead><tr>{[t("cU"),t("cE"),"OPAY","USDT",t("cA")].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
                      <tbody>
                        {filteredUsers.map(([uid,u])=>(
                          <tr key={uid}>
                            <td style={s.td}><div style={{fontWeight:600}}>{u.name}</div><div style={{fontSize:11,color:"#3a5a8a"}}>@{u.username}{u.isAdmin?" 🔑":""}</div></td>
                            <td style={{...s.td,color:"#3a5a8a",fontSize:12}}>{u.email}</td>
                            <td style={{...s.td,...s.G}}>{(u.opay||0).toFixed(2)}</td>
                            <td style={s.td}>{(u.usdt||0).toFixed(2)}</td>
                            <td style={s.td}>
                              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                                {[["addO",t("addO"),"primary"],["remO",t("remO"),"sell"],["addU",t("addU"),"primary"],["remU",t("remU"),"sell"]].map(([tp,lbl,v])=>(
                                  <button key={tp} style={{...s.btn(v),padding:"3px 8px",fontSize:11}} onClick={()=>openAdj(uid,tp)}>{lbl}</button>
                                ))}
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
                {adjUser&&(
                  <div style={{position:"fixed",inset:0,background:"#000a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
                    <div style={{...s.card,width:320,margin:0}}>
                      <div style={{fontWeight:600,marginBottom:12}}>{t("adjFor")} @{allUsers[adjUser]?.username}</div>
                      <input style={{...s.inp,marginBottom:10}} type="number" min="0" placeholder="0.00" value={adjAmt} onChange={e=>setAdjAmt(e.target.value)}/>
                      {adjMsg&&<div style={s.msg(adjMsg.startsWith("✅"))}>{adjMsg}</div>}
                      <div style={{display:"flex",gap:8,marginTop:12}}>
                        <button style={{...s.btn("primary"),flex:1}} onClick={doAdj}>{t("applyBtn")}</button>
                        <button style={{...s.btn("ghost"),flex:1}} onClick={()=>{setAdjUser(null);setAdjMsg("");}}>{t("cancelBtn")}</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── CRYPTOMUS TAB ── */}
            {adminTab==="cryptomus"&&(
              <div style={s.card}>
                <div style={s.ct}>{t("cmSetup")}</div>
                <div style={{...s.note,marginBottom:18,fontSize:12}}>
{"1. cryptomus.com → Login → Merchants → Create merchant\n2. Copy Merchant UUID → paste as API Key below\n3. Copy Payment API Key → paste as Secret below\n4. Click Save — keys stored securely in Firebase"}
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:"#3a5a8a",marginBottom:5}}>Merchant UUID (API Key)</div>
                  <input style={s.inp} placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" value={cmKey} onChange={e=>{setCmKey(e.target.value);setCmSaved(false);}}/>
                </div>
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:12,color:"#3a5a8a",marginBottom:5}}>Payment API Key (Secret)</div>
                  <input style={s.inp} type="password" placeholder="Your Payment API Key" value={cmSec} onChange={e=>{setCmSec(e.target.value);setCmSaved(false);}}/>
                </div>
                <button style={{...s.btn("primary"),width:"100%"}} onClick={saveCryptomusKeys}>💾 Save to Firebase</button>
                {cmSaved&&<div style={s.msg(true)}>{t("cmSavedMsg")}</div>}
              </div>
            )}

            {/* ── WALLETS TAB (all requests) ── */}
            {adminTab==="wallets"&&(
              <div style={s.card}>
                <div style={s.ct}>💳 All Deposit & Withdrawal Requests</div>
                {walletTxs.length===0?(
                  <div style={{textAlign:"center",color:"#3a5a8a",padding:"28px 0"}}>{t("noWalletTx")}</div>
                ):(
                  <div style={{overflowX:"auto"}}>
                    <table style={s.tbl}>
                      <thead><tr>{["UID","Type",t("colDate"),t("colUsdt"),"Net","Addr",t("colStatus"),"Action"].map(h=><th key={h} style={s.th}>{h}</th>)}</tr></thead>
                      <tbody>
                        {walletTxs.map((tx,i)=>(
                          <tr key={i}>
                            <td style={{...s.td,fontSize:11,color:"#3a5a8a",maxWidth:80,overflow:"hidden",textOverflow:"ellipsis"}}>{tx.uid?.slice(0,8)}…</td>
                            <td style={s.td}><span style={{fontSize:11,fontWeight:600,color:tx.type==="deposit"?"#00C896":"#f04060"}}>{tx.type==="deposit"?"⬇️":"⬆️"} {tx.type}</span></td>
                            <td style={{...s.td,color:"#3a5a8a",fontSize:12}}>{tx.date}</td>
                            <td style={{...s.td,...s.G,fontWeight:600}}>{tx.amt?.toFixed(2)}</td>
                            <td style={{...s.td,fontSize:12}}>{tx.net}</td>
                            <td style={{...s.td,fontSize:11,color:"#3a5a8a",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis"}}>{tx.addr||tx.coin||"—"}</td>
                            <td style={s.td}><span style={{fontSize:11,fontWeight:600,color:tx.status==="done"?"#00C896":tx.status==="failed"?"#f04060":"#ff9f4a"}}>{tx.status==="done"?t("statusDone"):tx.status==="failed"?t("statusFailed"):t("statusPending")}</span></td>
                            <td style={s.td}>
                              {tx.status==="pending"?(
                                <div style={{display:"flex",gap:4}}>
                                  <button style={{...s.btn("primary"),padding:"3px 8px",fontSize:11}} onClick={()=>approveWalletTx(tx)}>{t("approveBtn")}</button>
                                  <button style={{...s.btn("sell"),padding:"3px 8px",fontSize:11}} onClick={()=>rejectWalletTx(tx)}>{t("rejectBtn")}</button>
                                </div>
                              ):<span style={{fontSize:11,color:"#3a5a8a"}}>—</span>}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
